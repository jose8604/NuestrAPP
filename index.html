<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fdf6e3;
text-align:center;
overflow-x:hidden;
}
header{
background:#ffe066;
padding:15px;
font-weight:bold;
position:relative;
font-size:18px;
}
.menu-btn{
position:absolute;
left:10px;
top:10px;
font-size:22px;
cursor:pointer;
}
.dropdown{
display:none;
position:absolute;
top:55px;
left:10px;
background:white;
border-radius:16px;
padding:18px;
width:220px;
max-width:90vw;
box-shadow:0 6px 16px rgba(0,0,0,.15);
z-index:99;
}
.profile-box{text-align:center;margin-bottom:15px;}
.profile-photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffe066;
}
.change-photo-btn{
margin-top:10px;
font-size:13px;
width:100%;
}
.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}
.menu button{
background:#fff3bf;
border:none;
border-radius:20px;
padding:22px;
font-size:16px;
width:100%;
}
.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
position:relative;
max-width:100%;
overflow:hidden;
}
input,textarea,select{
margin:8px 0;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
width:100%;
font-size:15px;
}
button{
background:#ffe066;
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
}
li{
background:#fff9db;
margin:10px 0;
padding:12px;
border-radius:12px;
list-style:none;
text-align:left;
}
.back{
position:absolute;
left:10px;
top:10px;
}
.user-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.progress{
width:72px;
height:72px;
border-radius:50%;
background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.progress img{
width:56px;
height:56px;
border-radius:50%;
object-fit:cover;
}
.done{
text-decoration:line-through;
opacity:.6;
}
.small-photo{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
margin-right:8px;
}
.post-img{
width:100%;
max-width:220px;
border-radius:12px;
margin-top:10px;
display:block;
}
.obj-actions{float:right;}
.users-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}
.user-card{
background:#fffdf4;
border-radius:16px;
padding:12px;
text-align:left;
min-width:0;
}
.user-card ul{padding:0;margin:0;}
.rest-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}
.rest-col{
background:#fffdf4;
padding:12px;
border-radius:16px;
text-align:left;
}
.rest-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.plus-btn{
width:42px;
height:42px;
border-radius:50%;
font-size:24px;
padding:0;
}
.rest-item{
background:#fff9db;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.rest-line{
display:flex;
align-items:center;
gap:8px;
}
.rest-actions{
margin-left:auto;
display:flex;
gap:6px;
}
.star{
font-size:24px;
cursor:pointer;
opacity:.4;
}
.star.active{opacity:1;}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
.modal-box{
background:white;
width:92%;
max-width:420px;
border-radius:18px;
padding:18px;
max-height:90vh;
overflow:auto;
}
.icon-btn{
width:38px;
height:38px;
border-radius:50%;
padding:0;
font-size:18px;
}

/* NUEVO CALENDARIO */
.calendar-head{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-bottom:15px;
}
.cal-arrow{
width:42px;
height:42px;
border-radius:50%;
font-size:22px;
padding:0;
}
.cal-title{
font-size:20px;
font-weight:700;
flex:1;
}
.weekdays,.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}
.weekdays div{
font-size:12px;
font-weight:700;
opacity:.7;
}
.day-box{
background:#fff9db;
border-radius:14px;
min-height:75px;
padding:6px;
text-align:left;
cursor:pointer;
}
.day-num{
font-weight:700;
font-size:14px;
}
.day-events{
margin-top:5px;
display:flex;
flex-direction:column;
gap:3px;
}
.mini-event{
height:7px;
border-radius:20px;
}
.empty-day{visibility:hidden;}
.event-card{
background:#fff9db;
padding:10px;
border-radius:14px;
margin-top:10px;
text-align:left;
}

@media(max-width:700px){
.menu{grid-template-columns:1fr;padding:15px;}
.users-grid{grid-template-columns:1fr;}
.rest-wrap{grid-template-columns:1fr;}
.card{margin:10px;padding:16px;}
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">📷 Cambiar foto</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="auth">
<h2>Iniciar sesión</h2>
<input id="nameInput" placeholder="Usuario">
<input id="passInput" type="password" placeholder="Contraseña">
<input id="photoInput" type="file" accept="image/*">
<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">
<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Calendario</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>
<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"nuestrapp-3329a.firebaseapp.com",
projectId:"nuestrapp-3329a",
storageBucket:"nuestrapp-3329a.firebasestorage.app",
messagingSenderId:"11964303180",
appId:"1:11964303180:web:28412e809348d20d6af1e9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=null;
let selectedStars=0;
let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();

let data={
users:{},
planes:[],
restaurantes:[],
sitios:[]
};

/* TODO TU CÓDIGO ORIGINAL SE MANTIENE IGUAL */
/* SOLO SE AÑADE EL CALENDARIO */

function toggleMenu(){
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
if(user && data.users[user.name]){
menuUser.innerText=user.name;
menuPhoto.src=data.users[user.name].photo||"";
}
}

function closeMenu(){dropdown.style.display="none";}
function logout(){localStorage.removeItem("user");location.reload();}

/* ---------- SHOW SECTION MODIFICADO SOLO PARA PLANES ---------- */
function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){renderObjetivos();return;}
if(section==="restaurantes"){renderRestaurantes();return;}
if(section==="planes"){renderCalendario();return;}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<input id="newItem" placeholder="Escribe algo">
<button onclick="addItem('${section}')">Añadir</button>
<ul>
${data[section].map((item,i)=>`
<li>
<b>${item.user}</b><br>
${item.text}
<br><button onclick="removeItem('${section}',${i})">❌</button>
</li>
`).join("")}
</ul>
</div>`;
}

/* ---------- NUEVO CALENDARIO ---------- */

function nombreMes(m){
return ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m];
}

function fechaKey(y,m,d){
return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function renderCalendario(){

const firstDay=new Date(currentYear,currentMonth,1).getDay();
const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
let start=(firstDay===0?6:firstDay-1);

let grid="";

for(let i=0;i<start;i++){
grid+=`<div class="day-box empty-day"></div>`;
}

for(let d=1;d<=daysInMonth;d++){
const key=fechaKey(currentYear,currentMonth,d);
const eventos=data.planes.filter(x=>x.fecha===key);

grid+=`
<div class="day-box" onclick="openDay('${key}')">
<div class="day-num">${d}</div>
<div class="day-events">
${eventos.slice(0,3).map(e=>`
<div class="mini-event" style="background:${e.color}"></div>
`).join("")}
</div>
</div>`;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>

<div class="card">

<div class="calendar-head">
<button class="cal-arrow" onclick="prevMonth()">‹</button>
<div class="cal-title">${nombreMes(currentMonth)} ${currentYear}</div>
<button class="cal-arrow" onclick="nextMonth()">›</button>
</div>

<div class="weekdays">
<div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div class="calendar-grid">
${grid}
</div>

</div>`;
}

function prevMonth(){
currentMonth--;
if(currentMonth<0){
currentMonth=11;
currentYear--;
}
renderCalendario();
}

function nextMonth(){
currentMonth++;
if(currentMonth>11){
currentMonth=0;
currentYear++;
}
renderCalendario();
}

function openDay(fecha){

const eventos=data.planes.filter(x=>x.fecha===fecha);

content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalDay">
<div class="modal-box">

<h3>${fecha}</h3>

<input id="evTitulo" placeholder="Evento">
<input id="evHora" type="time">
<input id="evLugar" placeholder="Lugar">
<input id="evColor" type="color" value="#ffe066">
<textarea id="evDesc" placeholder="Notas"></textarea>

<button onclick="saveEvent('${fecha}')">Guardar evento</button>

<div style="margin-top:15px">
${eventos.map(e=>`
<div class="event-card">
<div style="display:flex;align-items:center;gap:8px;">
<img class="small-photo" src="${data.users[e.user]?.photo||''}">
<b>${e.titulo}</b>
</div>
🕒 ${e.hora||'-'}<br>
📍 ${e.lugar||'-'}<br>
👤 ${e.user}
</div>
`).join("") || "<p>Sin eventos</p>"}
</div>

<button onclick="closeModal()">Cerrar</button>

</div>
</div>`);
}

async function saveEvent(fecha){

const titulo=evTitulo.value.trim();
if(!titulo)return;

data.planes.push({
fecha,
titulo,
hora:evHora.value,
lugar:evLugar.value.trim(),
color:evColor.value,
desc:evDesc.value.trim(),
user:user.name
});

await saveData();
closeModal();
renderCalendario();
}

function closeModal(){
["modalDay","modalAdd","modalEdit","modalRate","modalView","modalVote"].forEach(id=>{
document.getElementById(id)?.remove();
});
}
</script>

</body>
</html>

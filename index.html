<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f3ee;
  --surface:#ffffff;
  --surface-soft:#fff8e6;
  --text:#1f2933;
  --muted:#697386;
  --brand:#ffd43b;
  --brand-2:#ff8a5b;
  --accent:#4dabf7;
  --green:#51cf66;
  --danger:#ff6b6b;
  --line:rgba(31,41,51,.1);
  --shadow:0 18px 45px rgba(31,41,51,.12);
  --shadow-soft:0 8px 24px rgba(31,41,51,.08);
}

*{box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  min-height:100vh;
  color:var(--text);
  text-align:center;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 12% 8%, rgba(255,212,59,.38), transparent 28%),
    radial-gradient(circle at 88% 18%, rgba(77,171,247,.22), transparent 30%),
    linear-gradient(145deg,#fffaf0 0%,#f6f3ee 45%,#eef6f7 100%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.35) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.35) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.42),transparent 72%);
}

header{
  position:sticky;
  top:0;
  z-index:80;
  padding:18px 52px;
  font-size:18px;
  font-weight:700;
  letter-spacing:0;
  color:#202124;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.7);
  box-shadow:0 10px 30px rgba(31,41,51,.08);
}

.menu-btn{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:22px;
  cursor:pointer;
  background:rgba(255,212,59,.28);
}

.dropdown{
  display:none;
  position:absolute;
  top:64px;
  left:14px;
  width:250px;
  max-width:calc(100vw - 28px);
  padding:18px;
  z-index:99;
  text-align:center;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(255,255,255,.9);
  border-radius:22px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

.profile-box{margin-bottom:16px;}

.profile-photo{
  width:86px;
  height:86px;
  border-radius:28px;
  object-fit:cover;
  border:4px solid #fff;
  box-shadow:0 10px 28px rgba(31,41,51,.16);
  background:var(--surface-soft);
}

.change-photo-btn{margin-top:12px;font-size:13px;width:100%;}

#auth{
  width:min(420px,calc(100% - 32px));
  margin:70px auto 0;
  padding:28px;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.85);
  border-radius:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);
}

#auth h2{
  margin:0 0 18px;
  font-size:28px;
}

#app{
  width:min(1100px,100%);
  margin:0 auto;
  padding:18px 0 34px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:24px;
}

.menu button{
  min-height:132px;
  width:100%;
  padding:22px 16px;
  border:none;
  border-radius:24px;
  color:var(--text);
  font-size:16px;
  font-weight:700;
  background:rgba(255,255,255,.78);
  box-shadow:var(--shadow-soft);
  border:1px solid rgba(255,255,255,.85);
  backdrop-filter:blur(16px);
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
}

.menu button:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(31,41,51,.14);
  background:#fff;
}

.card{
  position:relative;
  max-width:1060px;
  margin:18px auto;
  padding:24px;
  overflow:hidden;
  background:rgba(255,255,255,.86);
  border:1px solid rgba(255,255,255,.9);
  border-radius:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

input,textarea,select{
  width:100%;
  margin:8px 0;
  padding:14px 15px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  font-size:15px;
  font-family:inherit;
  outline:none;
  transition:border .18s ease, box-shadow .18s ease;
}

textarea{min-height:96px;resize:vertical;}

input:focus,textarea:focus,select:focus{
  border-color:rgba(77,171,247,.75);
  box-shadow:0 0 0 4px rgba(77,171,247,.14);
}

button{
  border:none;
  border-radius:15px;
  padding:11px 16px;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  color:#1f2933;
  background:linear-gradient(135deg,var(--brand),#ffe978);
  box-shadow:0 8px 18px rgba(255,212,59,.28);
  transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease;
}

button:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(255,212,59,.34);}
button:active{transform:translateY(0);opacity:.82;}

.back{
  position:absolute;
  left:16px;
  top:16px;
  width:42px;
  height:42px;
  border-radius:14px;
  padding:0;
  z-index:2;
}

li{
  list-style:none;
  margin:10px 0;
  padding:13px 14px;
  text-align:left;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 4px 14px rgba(31,41,51,.05);
}

.user-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.progress{
  width:76px;
  height:76px;
  border-radius:24px;
  background:conic-gradient(var(--green) var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:background .3s ease;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.8);
}

.progress img{
  width:58px;
  height:58px;
  border-radius:19px;
  object-fit:cover;
  border:3px solid #fff;
}

.done{text-decoration:line-through;opacity:.55;}

.small-photo{
  width:34px;
  height:34px;
  border-radius:12px;
  object-fit:cover;
  margin-right:8px;
  background:var(--surface-soft);
}

.obj-actions{float:right;display:flex;gap:6px;}

.users-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:12px;
}

.user-card,.rest-col{
  padding:16px;
  text-align:left;
  border-radius:22px;
  background:linear-gradient(180deg,#fff,#fffaf0);
  border:1px solid rgba(31,41,51,.08);
  box-shadow:0 8px 22px rgba(31,41,51,.06);
}

.user-card ul{padding:0;margin:0;}

.rest-wrap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:18px;
}

.rest-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  padding-left:54px;
}

.plus-btn{
  width:46px;
  height:46px;
  border-radius:16px;
  font-size:25px;
  padding:0;
}

.rest-item{
  padding:13px;
  margin-bottom:12px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 6px 18px rgba(31,41,51,.06);
}

.rest-line{
  display:flex;
  align-items:center;
  gap:8px;
}

.rest-actions{
  margin-left:auto;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.star{
  font-size:30px;
  cursor:pointer;
  opacity:.28;
  filter:grayscale(1);
  transition:transform .16s ease, opacity .16s ease, filter .16s ease;
}

.star:hover,.star.active{
  opacity:1;
  filter:grayscale(0);
  transform:scale(1.08);
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:18px;
  background:rgba(31,41,51,.48);
  backdrop-filter:blur(8px);
}

.modal-box{
  width:92%;
  max-width:460px;
  max-height:90vh;
  overflow:auto;
  padding:22px;
  border-radius:26px;
  background:#fff;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  animation:pop .18s ease;
}

@keyframes pop{
  from{transform:scale(.97);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.icon-btn{
  width:38px;
  height:38px;
  border-radius:13px;
  padding:0;
  font-size:16px;
  box-shadow:none;
}

.cal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0 18px;
  padding-left:42px;
}

.cal-head h3{margin:0;font-size:22px;}

.cal-nav{
  width:44px;
  height:44px;
  border-radius:15px;
  font-size:18px;
  padding:0;
}

.weekdays,.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.weekdays div{
  padding:8px 0;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.day{
  min-height:92px;
  padding:8px;
  cursor:pointer;
  font-size:14px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  border-radius:18px;
  background:#fff;
  border:1px solid rgba(31,41,51,.08);
  box-shadow:0 4px 12px rgba(31,41,51,.04);
  transition:transform .16s ease, box-shadow .16s ease;
}

.day:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(31,41,51,.09);
}

.day.empty{
  background:transparent;
  border:none;
  box-shadow:none;
  cursor:default;
}

.day.today{
  border:2px solid var(--brand);
  background:linear-gradient(180deg,#fff,#fff8d6);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  margin:4px auto 0;
}

.event-item{
  padding:12px;
  margin:10px 0;
  text-align:left;
  color:#111;
  border-radius:18px;
  box-shadow:0 8px 18px rgba(31,41,51,.08);
}

hr{
  border:none;
  height:1px;
  background:var(--line);
  margin:18px 0;
}

p,small{color:var(--muted);}

@media(max-width:900px){
  .menu{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:700px){
  header{padding:16px 48px;font-size:16px;}
  #auth{margin-top:36px;padding:22px;border-radius:24px;}
  .menu{grid-template-columns:1fr;padding:16px;}
  .menu button{min-height:92px;}
  .users-grid,.rest-wrap{grid-template-columns:1fr;}
  .card{margin:12px 10px;padding:18px;border-radius:24px;}
  .rest-top,.cal-head{padding-left:48px;}
  .calendar-grid,.weekdays{gap:5px;}
  .day{min-height:76px;border-radius:14px;font-size:13px;padding:6px;}
  .modal{align-items:flex-end;padding:0;}
  .modal-box{width:100%;max-width:none;border-radius:26px 26px 0 0;}
}

@media(max-width:420px){
  .rest-actions{width:100%;margin-left:0;margin-top:8px;}
  .rest-line{align-items:flex-start;flex-wrap:wrap;}
  .cal-head h3{font-size:18px;}
}

#content{
  position:relative;
  padding-top:58px;
}

#content:empty{
  padding-top:0;
}

.back{
  position:fixed;
  left:16px;
  top:76px;
  z-index:120;
  width:auto;
  min-width:46px;
  height:46px;
  padding:0 14px;
  border-radius:16px;
  background:#ffffff;
  border:1px solid rgba(31,41,51,.1);
  box-shadow:0 12px 28px rgba(31,41,51,.14);
}

.back::after{
  content:" Atrás";
  font-size:14px;
  font-weight:700;
}

@media(max-width:700px){
  #content{
    padding-top:54px;
  }

  .back{
    top:68px;
    left:12px;
    height:44px;
  }
}

button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:6px;
}

.menu button,
#auth button,
.modal-box button,
.card > button,
.change-photo-btn,
.dropdown button{
  margin-left:auto;
  margin-right:auto;
}

#auth button{
  width:100%;
}

.card > button:not(.back){
  min-width:160px;
}

.rest-top .plus-btn,
.cal-head .cal-nav,
.icon-btn,
.back{
  margin-left:0;
  margin-right:0;
  flex-shrink:0;
}

.rest-actions{
  align-items:center;
}

.rest-line{
  align-items:center;
}

@media(max-width:700px){
  .card > button:not(.back),
  .modal-box button{
    width:100%;
  }

  .rest-actions{
    justify-content:center;
  }
}

.obj-actions{
  float:none;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:6px;
  margin-left:auto;
  flex-shrink:0;
}

.user-card li{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  overflow:hidden;
}

.user-card li .obj-actions button{
  width:36px;
  height:36px;
  min-width:36px;
  padding:0;
  border-radius:12px;
}

@media(max-width:420px){
  .user-card li{
    align-items:flex-start;
    flex-direction:column;
  }

  .obj-actions{
    width:100%;
    justify-content:flex-end;
  }
}

.done .obj-actions,
.done .obj-actions button{
  text-decoration:none;
}

.done{
  text-decoration:none;
  opacity:.65;
}

.done::before{
  content:"✓ ";
  color:#2f9e44;
  font-weight:700;
}

.gate-card{
  width:min(460px,calc(100% - 32px));
  margin:46px auto 0;
}

.gate-card h1{
  margin:8px 0 18px;
  font-size:42px;
}

.gate-card label,
.settings-check{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  padding:12px;
  text-align:left;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
}

.gate-card input[type="checkbox"],
.settings-check input{
  width:auto;
  margin:0;
}

.settings-layout{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:18px;
  text-align:left;
}

.settings-nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.settings-nav button{
  width:100%;
  justify-content:flex-start;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:none;
}

.settings-panel{
  min-width:0;
}

.settings-panel ul{
  padding:0;
  margin:0 0 18px;
}

.settings-panel li{
  display:flex;
  align-items:center;
  gap:8px;
}

@media(max-width:700px){
  .settings-layout{
    grid-template-columns:1fr;
  }

  .settings-nav{
    flex-direction:row;
  }

 .settings-nav button{
    justify-content:center;
  }
}

.menu-order-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:12px 0 18px;
}

.menu-order-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 6px 18px rgba(31,41,51,.06);
}

.menu-order-item.dragging{
  opacity:.45;
}

.menu-order-item .settings-check{
  flex:1;
  margin:0;
}

.drag-handle{
  width:42px;
  height:42px;
  padding:0;
  border-radius:14px;
  cursor:grab;
  box-shadow:none;
  background:#fff;
  border:1px solid var(--line);
}

.drag-handle:active{
  cursor:grabbing;
}

.success-overlay{
  position:fixed;
  inset:0;
  z-index:2000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(31,41,51,.36);
  backdrop-filter:blur(8px);
  animation:successFadeIn .18s ease forwards;
}

.success-box{
  width:min(280px,calc(100% - 48px));
  padding:28px 22px;
  border-radius:28px;
  background:#fff;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  animation:successPop .26s ease forwards;
}

.success-box h3{
  margin:0;
  font-size:18px;
  color:var(--text);
}

.success-ring{
  width:96px;
  height:96px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(81,207,102,.12);
}

.success-ring::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:4px solid rgba(81,207,102,.22);
  animation:successPulse .85s ease-out infinite;
}

.success-ring::after{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:4px solid #51cf66;
  border-top-color:transparent;
  animation:successSpin .65s ease forwards;
}

.success-check{
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#51cf66;
  color:#fff;
  font-size:34px;
  font-weight:700;
  transform:scale(0);
  animation:successCheck .28s ease .42s forwards;
}

.success-overlay.hide{
  animation:successFadeOut .22s ease forwards;
}

@keyframes successFadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes successFadeOut{
  from{opacity:1;}
  to{opacity:0;}
}

@keyframes successPop{
  from{transform:scale(.92);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes successPulse{
  from{transform:scale(.92);opacity:.9;}
  to{transform:scale(1.18);opacity:0;}
}

@keyframes successSpin{
  from{transform:rotate(-140deg);opacity:.4;}
  to{transform:rotate(45deg);opacity:1;}
}

@keyframes successCheck{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
 <span id="roomTitle">Nuestra App</span> 

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<button class="change-photo-btn" onclick="openSettings()">⚙️ Configuración</button>
<button class="change-photo-btn" onclick="openRoomSwitcher()">🔁 Cambiar sala</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="roomGate" class="card gate-card" style="display:none">
  <div id="roomStart">
  <h2>Entrar a una sala</h2>

  <div id="myRoomsBox" style="margin:14px 0 18px;"></div>

  <button onclick="showCreateRoom()">Crear sala</button>
  <button onclick="showJoinRoom()">Unirte a sala</button>
</div>

  <div id="createRoomBox" style="display:none">
    <h2>Crear sala</h2>
    <input id="newRoomName" placeholder="Nombre de la sala">

    <h3>Elige los menús</h3>
    <label><input type="checkbox" class="menuCheck" value="objetivos" checked> Objetivos</label>
    <label><input type="checkbox" class="menuCheck" value="planes" checked> Calendario</label>
    <label><input type="checkbox" class="menuCheck" value="restaurantes" checked> Restaurantes</label>
    <label><input type="checkbox" class="menuCheck" value="viajes" checked> Viajes</label>

    <button onclick="createRoom()">Continuar</button>
    <button onclick="showRoomStart()">Atrás</button>
  </div>

  <div id="joinRoomBox" style="display:none">
    <h2>Unirte a sala</h2>
    <input id="joinCode" maxlength="6" placeholder="Código de 6 cifras">
    <button onclick="joinRoom()">Entrar a la sala</button>
    <button onclick="showRoomStart()">Atrás</button>
  </div>

  <div id="inviteBox" style="display:none">
    <h2>Sala creada</h2>
    <p>Código de acceso</p>

function compressImage(file,size=320,quality=.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}
canvas.width=w;
canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function animateProgressBars(){
  document.querySelectorAll(".progress").forEach(el=>{
    const userName = el.dataset.user;
    const target = Number(el.dataset.progress || 0);
    let current = lastProgressByUser[userName];

    if(current === undefined){
      current = target;
      el.style.setProperty("--progress", target + "%");
      lastProgressByUser[userName] = target;
      return;
    }

    if(Math.abs(target - current) < 0.5){
      el.style.setProperty("--progress", target + "%");
      lastProgressByUser[userName] = target;
      return;
    }

    function step(){
      current += (target - current) * 0.12;

      if(Math.abs(target - current) < 0.5){
        current = target;
      }

      el.style.setProperty("--progress", current + "%");

      if(current !== target){
        requestAnimationFrame(step);
      }else{
        lastProgressByUser[userName] = target;
      }
    }

    step();
  });
}

async function generateRoomCode(){
  let code;
  let exists = true;

  while(exists){
    code = String(Math.floor(100000 + Math.random() * 900000));
    const doc = await db.collection("rooms").doc(code).get();
    exists = doc.exists;
  }

  return code;
}

async function rememberRoomForUser(code, name){
  if(!user || !user.uid || !code) return;

  const roomInfo = {
    code,
    name:name || "Sala sin nombre"
  };

  saveRoomToList(code, roomInfo.name);

  await db.collection("profiles").doc(user.uid).set({
    rooms: firebase.firestore.FieldValue.arrayUnion(roomInfo)
  }, {merge:true});
}

async function getUserRooms(){
  if(!user || !user.uid) return getSavedRooms();

  const profileDoc = await db.collection("profiles").doc(user.uid).get();
  const profileRooms = profileDoc.exists ? (profileDoc.data().rooms || []) : [];
  const localRooms = getSavedRooms();

  const allRooms = [...profileRooms, ...localRooms];
  const unique = [];

  allRooms.forEach(room=>{
    if(room && room.code && !unique.some(x=>x.code === room.code)){
      unique.push(room);
    }
  });

  return unique;
}

function getSavedRooms(){
  return JSON.parse(localStorage.getItem("savedRooms") || "[]");
}

function saveRoomToList(code, name){
  let rooms = getSavedRooms();

  rooms = rooms.filter(r=>r.code !== code);

  rooms.unshift({
    code,
    name:name || "Sala sin nombre"
  });

  localStorage.setItem("savedRooms", JSON.stringify(rooms));
}

function setupMenuDrag(){
  const list = document.getElementById("menuOrderList");
  if(!list) return;

  let draggedItem = null;

  list.querySelectorAll(".menu-order-item").forEach(item=>{
    item.addEventListener("dragstart",()=>{
      draggedItem = item;
      item.classList.add("dragging");
    });

    item.addEventListener("dragend",()=>{
      item.classList.remove("dragging");
      draggedItem = null;
    });

    item.addEventListener("dragover",e=>{
      e.preventDefault();

      const target = e.currentTarget;
      if(!draggedItem || draggedItem === target) return;

      const rect = target.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;

      list.insertBefore(draggedItem, after ? target.nextSibling : target);
    });
  });
}

async function saveProfileSettings(){
  const newName = settingsName.value.trim();
  const file = settingsPhotoInput.files[0];

  if(!newName){
    alert("El nombre no puede estar vacío");
    return;
  }

  let photo = user.photo || "";

  if(file){
    photo = await compressImage(file,320,.85);
  }

  user.name = newName;
  user.photo = photo;

  await db.collection("profiles").doc(user.uid).set(user);
  localStorage.setItem("user", JSON.stringify(user));

  if(data.users[user.uid]){
    data.users[user.uid].name = newName;
    data.users[user.uid].photo = photo;
  }

  await saveData();
  renderSettings();
}

        <div class="success-ring">
          <div class="success-check">✓</div>
        </div>
        <h3>${text}</h3>
      </div>
    </div>
  `);

  setTimeout(()=>{
    document.querySelectorAll(".success-overlay").forEach(x=>x.classList.add("hide"));
  },1200);

  setTimeout(()=>{
    document.querySelectorAll(".success-overlay").forEach(x=>x.remove());
  },1550);
}


async function saveRoomSettings(){
  const selected = [...document.querySelectorAll(".settingsMenuCheck:checked")].map(x=>x.value);

  if(!selected.length){
    alert("La sala necesita al menos un menú");
    return;
  }

  const orderedMenus = [...document.querySelectorAll(".menu-order-item")]
    .map(x=>x.dataset.menu);

  data.roomName = settingsRoomName.value.trim() || "Nuestra App";
  data.enabledMenus = selected;

if(!data.users[user.uid]){
  data.users[user.uid] = {
    uid:user.uid,
    name:user.name,
    email:user.email,
    photo:user.photo || "",
    objetivos:[],
    menuOrder:[]
  };
}

  data.users[user.uid].menuOrder = orderedMenus;

  await saveData();

  roomTitle.innerText = data.roomName;
  renderMainMenu();

showSuccessOverlay("Configuración guardada");
renderSettings();
}

</script>

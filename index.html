```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fdf6e3;
  text-align:center;
  overflow-x:hidden;
}

header{
  background:#ffe066;
  padding:15px;
  font-weight:bold;
  position:relative;
  font-size:18px;
}

.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:10px;
  background:white;
  border-radius:16px;
  padding:18px;
  width:220px;
  max-width:90vw;
  box-shadow:0 6px 16px rgba(0,0,0,.15);
  z-index:99;
}

.profile-box{text-align:center;margin-bottom:15px;}

.profile-photo{
  width:80px;height:80px;border-radius:50%;
  object-fit:cover;border:4px solid #ffe066;
}

.change-photo-btn{margin-top:10px;font-size:13px;width:100%;}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.menu button{
  background:#fff3bf;
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:16px;
  width:100%;
}

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
  position:relative;
}

input,textarea,select{
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  width:100%;
  font-size:15px;
}

button{
  background:#ffe066;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
}

li{
  background:#fff9db;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  list-style:none;
  text-align:left;
}

.back{
  position:absolute;
  left:10px;
  top:10px;
}

.small-photo{
  width:32px;height:32px;border-radius:50%;
  object-fit:cover;
}

.hidden-file{display:none;}

.rest-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.rest-col{
  background:#fffdf4;
  border-radius:16px;
  padding:12px;
  text-align:left;
}

.rest-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.plus-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  font-size:24px;
  padding:0;
}

.rest-item{
  background:#fff9db;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
}

.rest-line{
  display:flex;
  align-items:center;
  gap:8px;
}

.rest-actions{
  margin-left:auto;
  display:flex;
  gap:6px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:10px;
  padding:0;
  font-size:16px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:white;
  width:92%;
  max-width:430px;
  max-height:92vh;
  overflow:auto;
  border-radius:18px;
  padding:18px;
  text-align:left;
}

.gallery-btn{
  width:38px;
  height:38px;
  border-radius:10px;
  padding:0;
}

.post-img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.star{
  font-size:28px;
  cursor:pointer;
  opacity:.35;
}

.star.active{opacity:1;}

.rate-row{
  display:flex;
  gap:4px;
  justify-content:center;
  margin:10px 0;
}

.user-rate{
  background:#fff3bf;
  padding:8px;
  border-radius:10px;
  margin-top:8px;
}

@media(max-width:700px){
  .menu{grid-template-columns:1fr;padding:15px;}
  .rest-wrap{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">📷 Cambiar foto</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="auth">
<div style="font-size:22px;margin-top:25px;font-weight:bold;">Iniciar sesión</div>

<input id="nameInput" placeholder="Usuario">
<input id="passInput" type="password" placeholder="Contraseña">
<input id="photoInput" type="file" accept="image/*">

<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">
<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Planes</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user=null;
let selectedStars=0;

let data={
  users:{},
  planes:[],
  restaurantes:[],
  sitios:[]
};

function toggleMenu(){
  dropdown.style.display =
  dropdown.style.display==="block" ? "none":"block";
  if(dropdown.style.display==="block") updateMenuProfile();
}

function closeMenu(){ dropdown.style.display="none"; }

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function updateMenuProfile(){
  if(!user || !data.users[user.name]) return;
  menuUser.innerText=user.name;
  menuPhoto.src=data.users[user.name].photo || "";
}

function compressImage(file,size=320,quality=0.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}

const canvas=document.createElement("canvas");
canvas.width=w; canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function loadData(){
db.collection("app").doc("data").onSnapshot(doc=>{
if(doc.exists){
data=doc.data();
if(!data.restaurantes) data.restaurantes=[];
updateMenuProfile();
}
});
}

async function saveData(){
await db.collection("app").doc("data").set(data);
}

async function register(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();
const file=photoInput.files[0];

if(!name || !pass) return alert("Completa usuario y contraseña");
if(data.users[name]) return alert("Ese usuario ya existe");

let photo=null;
if(file) photo=await compressImage(file);

data.users[name]={
name,password:pass,photo,objetivos:[]
};

await saveData();

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

async function login(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();

const doc=await db.collection("app").doc("data").get();
if(doc.exists) data=doc.data();

const found=data.users[name];
if(!found) return alert("Usuario no existe");
if(found.password!==pass) return alert("Contraseña incorrecta");

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

function startApp(){
loadData();
auth.style.display="none";
app.style.display="block";
updateMenuProfile();
}

changePhotoInput.addEventListener("change",async function(){
const file=this.files[0];
if(!file || !user) return;

data.users[user.name].photo=await compressImage(file);
await saveData();
updateMenuProfile();
});

function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="restaurantes"){
renderRestaurantes();
return;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<h3>${section}</h3>
</div>`;
}

function renderRestaurantes(){
const pendientes=data.restaurantes.filter(x=>!x.done);
const valorados=data.restaurantes.filter(x=>x.done);

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>

<div class="card" data-section="restaurantes">

<div class="rest-top">
<h3 style="margin:0">🍽️ Restaurantes</h3>
<button class="plus-btn" onclick="openAddRestaurant()">+</button>
</div>

<div class="rest-wrap">

<div class="rest-col">
<b>Pendientes</b>

${pendientes.map(item=>{
const i=data.restaurantes.indexOf(item);
return `
<div class="rest-item">
<div class="rest-line">
<img class="small-photo" src="${data.users[item.user]?.photo || ''}">
<span style="font-weight:bold;cursor:pointer"
onclick="openRestaurantView(${i})">${item.nombre}</span>

<div class="rest-actions">
<button class="icon-btn" onclick="removeItem('restaurantes',${i})">❌</button>
<button class="icon-btn" onclick="openEditRestaurant(${i})">✏️</button>
<button class="icon-btn" onclick="openRateRestaurant(${i})">✔</button>
</div>
</div>
</div>`;
}).join("")}

</div>

<div class="rest-col">
<b>Valorados</b>

${valorados.map(item=>{
const i=data.restaurantes.indexOf(item);
const avg=getAverage(item);
return `
<div class="rest-item">
<div class="rest-line">
<span style="font-weight:bold;cursor:pointer"
onclick="openRestaurantView(${i})">${item.nombre}</span>

<div class="rest-actions">
<button class="icon-btn" onclick="removeItem('restaurantes',${i})">❌</button>
<button class="icon-btn" onclick="openEditRestaurant(${i})">✏️</button>
<button class="icon-btn" onclick="openRateRestaurant(${i})">⭐</button>
</div>
</div>

<div style="margin-top:6px">⭐ ${avg} / 5</div>
</div>`;
}).join("")}

</div>

</div>
</div>`;
}

function getAverage(item){
if(!item.rates || !item.rates.length) return item.stars || 0;
let total=item.rates.reduce((a,b)=>a+b.stars,0);
return (total/item.rates.length).toFixed(1);
}

function openAddRestaurant(editIndex=null){
let item=editIndex!==null ? data.restaurantes[editIndex] : null;

content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalAdd">
<div class="modal-box">
<h3>${item?"Editar":"Añadir"} restaurante</h3>

<input id="rNombre" placeholder="Nombre" value="${item?.nombre || ""}">
<input id="rDireccion" placeholder="Dirección" value="${item?.direccion || ""}">
<textarea id="rDesc" placeholder="Descripción, platos, tipo de sitio...">${item?.descripcion || ""}</textarea>
<input type="file" id="rFotos" multiple accept="image/*">

<button onclick="saveRestaurant(${editIndex})">${item?"Guardar":"Añadir"}</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
}

function openEditRestaurant(i){
openAddRestaurant(i);
}

async function saveRestaurant(editIndex){
const nombre=rNombre.value.trim();
if(!nombre) return;

let fotos=[];
const files=rFotos.files;

for(let f of files){
fotos.push(await compressImage(f,600,0.88));
}

if(editIndex===null){
data.restaurantes.push({
nombre,
direccion:rDireccion.value.trim(),
descripcion:rDesc.value.trim(),
fotos,
user:user.name,
done:false,
rates:[]
});
}else{
let r=data.restaurantes[editIndex];
r.nombre=nombre;
r.direccion=rDireccion.value.trim();
r.descripcion=rDesc.value.trim();
if(fotos.length) r.fotos=fotos;
}

await saveData();
renderRestaurantes();
closeModal();
}

function openRestaurantView(i){
const r=data.restaurantes[i];

content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalView">
<div class="modal-box">
<h3>${r.nombre}</h3>

<p><b>Dirección:</b><br>${r.direccion || "-"}</p>
<p><b>Descripción:</b><br>${r.descripcion || "-"}</p>

<button class="gallery-btn" onclick="openGallery(${i})">🖼️</button>

${r.done ? `<p style="margin-top:10px"><b>Media:</b> ⭐ ${getAverage(r)}</p>`:""}

${(r.rates||[]).map(x=>`
<div class="user-rate">
<b>${x.user}</b> · ⭐ ${x.stars} · 💰 ${x.precio}
</div>`).join("")}

<button onclick="closeModal()">Cerrar</button>
</div>
</div>
`);
}

function openGallery(i){
const r=data.restaurantes[i];
content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalGallery">
<div class="modal-box">
<h3>Galería</h3>
${(r.fotos||[]).map(f=>`<img class="post-img" src="${f}">`).join("")}
${(r.rates||[]).flatMap(x=>x.fotos||[]).map(f=>`<img class="post-img" src="${f}">`).join("")}
<button onclick="document.getElementById('modalGallery').remove()">Cerrar</button>
</div>
</div>
`);
}

function openRateRestaurant(i){
content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalRate">
<div class="modal-box">
<h3>Valorar restaurante</h3>

<div class="rate-row">
${[1,2,3,4,5].map(n=>`
<span class="star" onclick="setStars(${n})">⭐</span>
`).join("")}
</div>

<input id="precioRate" placeholder="Precio aprox">
<input type="file" id="rateFotos" multiple accept="image/*">

<button onclick="saveRate(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
selectedStars=0;
}

function setStars(n){
selectedStars=n;
document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
}

async function saveRate(i){
let fotos=[];
for(let f of rateFotos.files){
fotos.push(await compressImage(f,600,0.88));
}

if(!data.restaurantes[i].rates) data.restaurantes[i].rates=[];

const prev=data.restaurantes[i].rates.find(x=>x.user===user.name);

if(prev){
prev.stars=selectedStars;
prev.precio=precioRate.value.trim();
prev.fotos=fotos;
}else{
data.restaurantes[i].rates.push({
user:user.name,
stars:selectedStars,
precio:precioRate.value.trim(),
fotos
});
}

data.restaurantes[i].done=true;
data.restaurantes[i].stars=selectedStars;

await saveData();
renderRestaurantes();
closeModal();
}

function closeModal(){
document.getElementById("modalAdd")?.remove();
document.getElementById("modalRate")?.remove();
document.getElementById("modalView")?.remove();
}

function removeItem(section,i){
data[section].splice(i,1);
saveData();
renderRestaurantes();
}

function goBack(){
content.innerHTML="";
mainMenu.style.display="grid";
}

document.addEventListener("DOMContentLoaded",()=>{
loadData();

const saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
setTimeout(startApp,500);
}
});
</script>

</body>
</html>

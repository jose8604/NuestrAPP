<!DOCTYPE html>
<html lang="es">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f3ee;
  --surface:#ffffff;
  --surface-soft:#fff8e6;
  --text:#1f2933;
  --muted:#697386;
  --brand:#ffd43b;
  --brand-2:#ff8a5b;
  --accent:#4dabf7;
  --green:#51cf66;
  --danger:#ff6b6b;
  --line:rgba(31,41,51,.1);
  --shadow:0 18px 45px rgba(31,41,51,.12);
  --shadow-soft:0 8px 24px rgba(31,41,51,.08);
}

*{box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  min-height:100vh;
  color:var(--text);
  text-align:center;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 12% 8%, rgba(255,212,59,.38), transparent 28%),
    radial-gradient(circle at 88% 18%, rgba(77,171,247,.22), transparent 30%),
    linear-gradient(145deg,#fffaf0 0%,#f6f3ee 45%,#eef6f7 100%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.35) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.35) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.42),transparent 72%);
}

header{
  position:sticky;
  top:0;
  z-index:80;
  padding:18px 52px;
  font-size:18px;
  font-weight:700;
  letter-spacing:0;
  color:#202124;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.7);
  box-shadow:0 10px 30px rgba(31,41,51,.08);
}

.menu-btn{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:22px;
  cursor:pointer;
  background:rgba(255,212,59,.28);
}

.dropdown{
  display:none;
  position:absolute;
  top:64px;
  left:14px;
  width:250px;
  max-width:calc(100vw - 28px);
  padding:18px;
  z-index:99;
  text-align:center;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(255,255,255,.9);
  border-radius:22px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

.profile-box{margin-bottom:16px;}

.profile-photo{
  width:86px;
  height:86px;
  border-radius:28px;
  object-fit:cover;
  border:4px solid #fff;
  box-shadow:0 10px 28px rgba(31,41,51,.16);
  background:var(--surface-soft);
}

.change-photo-btn{margin-top:12px;font-size:13px;width:100%;}

#auth{
  width:min(420px,calc(100% - 32px));
  margin:70px auto 0;
  padding:28px;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.85);
  border-radius:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);
}

#auth h2{
  margin:0 0 18px;
  font-size:28px;
}

#app{
  width:min(1100px,100%);
  margin:0 auto;
  padding:18px 0 34px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:24px;
}

.menu button{
  min-height:132px;
  width:100%;
  padding:22px 16px;
  border:none;
  border-radius:24px;
  color:var(--text);
  font-size:16px;
  font-weight:700;
  background:rgba(255,255,255,.78);
  box-shadow:var(--shadow-soft);
  border:1px solid rgba(255,255,255,.85);
  backdrop-filter:blur(16px);
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
}

.menu button:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(31,41,51,.14);
  background:#fff;
}

.card{
  position:relative;
  max-width:1060px;
  margin:18px auto;
  padding:24px;
  overflow:hidden;
  background:rgba(255,255,255,.86);
  border:1px solid rgba(255,255,255,.9);
  border-radius:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
}

input,textarea,select{
  width:100%;
  margin:8px 0;
  padding:14px 15px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  font-size:15px;
  font-family:inherit;
  outline:none;
  transition:border .18s ease, box-shadow .18s ease;
}

textarea{min-height:96px;resize:vertical;}

input:focus,textarea:focus,select:focus{
  border-color:rgba(77,171,247,.75);
  box-shadow:0 0 0 4px rgba(77,171,247,.14);
}

button{
  border:none;
  border-radius:15px;
  padding:11px 16px;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  color:#1f2933;
  background:linear-gradient(135deg,var(--brand),#ffe978);
  box-shadow:0 8px 18px rgba(255,212,59,.28);
  transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease;
}

button:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(255,212,59,.34);}
button:active{transform:translateY(0);opacity:.82;}

.back{
  position:absolute;
  left:16px;
  top:16px;
  width:42px;
  height:42px;
  border-radius:14px;
  padding:0;
  z-index:2;
}

li{
  list-style:none;
  margin:10px 0;
  padding:13px 14px;
  text-align:left;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 4px 14px rgba(31,41,51,.05);
}

.user-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.progress{
  width:76px;
  height:76px;
  border-radius:24px;
  background:conic-gradient(var(--green) var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:background .3s ease;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.8);
}

.progress img{
  width:58px;
  height:58px;
  border-radius:19px;
  object-fit:cover;
  border:3px solid #fff;
}

.done{text-decoration:line-through;opacity:.55;}

.small-photo{
  width:34px;
  height:34px;
  border-radius:12px;
  object-fit:cover;
  margin-right:8px;
  background:var(--surface-soft);
}

.obj-actions{float:right;display:flex;gap:6px;}

.users-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:12px;
}

.user-card,.rest-col{
  padding:16px;
  text-align:left;
  border-radius:22px;
  background:linear-gradient(180deg,#fff,#fffaf0);
  border:1px solid rgba(31,41,51,.08);
  box-shadow:0 8px 22px rgba(31,41,51,.06);
}

.user-card ul{padding:0;margin:0;}

.rest-wrap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:18px;
}

.rest-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  padding-left:54px;
}

.plus-btn{
  width:46px;
  height:46px;
  border-radius:16px;
  font-size:25px;
  padding:0;
}

.rest-item{
  padding:13px;
  margin-bottom:12px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 6px 18px rgba(31,41,51,.06);
}

.rest-line{
  display:flex;
  align-items:center;
  gap:8px;
}

.rest-actions{
  margin-left:auto;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.star{
  font-size:30px;
  cursor:pointer;
  opacity:.28;
  filter:grayscale(1);
  transition:transform .16s ease, opacity .16s ease, filter .16s ease;
}

.star:hover,.star.active{
  opacity:1;
  filter:grayscale(0);
  transform:scale(1.08);
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:18px;
  background:rgba(31,41,51,.48);
  backdrop-filter:blur(8px);
}

.modal-box{
  width:92%;
  max-width:460px;
  max-height:90vh;
  overflow:auto;
  padding:22px;
  border-radius:26px;
  background:#fff;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  animation:pop .18s ease;
}

@keyframes pop{
  from{transform:scale(.97);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.icon-btn{
  width:38px;
  height:38px;
  border-radius:13px;
  padding:0;
  font-size:16px;
  box-shadow:none;
}

.cal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0 18px;
  padding-left:42px;
}

.cal-head h3{margin:0;font-size:22px;}

.cal-nav{
  width:44px;
  height:44px;
  border-radius:15px;
  font-size:18px;
  padding:0;
}

.weekdays,.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.weekdays div{
  padding:8px 0;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.day{
  min-height:92px;
  padding:8px;
  cursor:pointer;
  font-size:14px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  border-radius:18px;
  background:#fff;
  border:1px solid rgba(31,41,51,.08);
  box-shadow:0 4px 12px rgba(31,41,51,.04);
  transition:transform .16s ease, box-shadow .16s ease;
}

.day:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(31,41,51,.09);
}

.day.empty{
  background:transparent;
  border:none;
  box-shadow:none;
  cursor:default;
}

.day.today{
  border:2px solid var(--brand);
  background:linear-gradient(180deg,#fff,#fff8d6);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  margin:4px auto 0;
}

.event-item{
  padding:12px;
  margin:10px 0;
  text-align:left;
  color:#111;
  border-radius:18px;
  box-shadow:0 8px 18px rgba(31,41,51,.08);
}

hr{
  border:none;
  height:1px;
  background:var(--line);
  margin:18px 0;
}

p,small{color:var(--muted);}

@media(max-width:900px){
  .menu{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:700px){
  header{padding:16px 48px;font-size:16px;}
  #auth{margin-top:36px;padding:22px;border-radius:24px;}
  .menu{grid-template-columns:1fr;padding:16px;}
  .menu button{min-height:92px;}
  .users-grid,.rest-wrap{grid-template-columns:1fr;}
  .card{margin:12px 10px;padding:18px;border-radius:24px;}
  .rest-top,.cal-head{padding-left:48px;}
  .calendar-grid,.weekdays{gap:5px;}
  .day{min-height:76px;border-radius:14px;font-size:13px;padding:6px;}
  .modal{align-items:flex-end;padding:0;}
  .modal-box{width:100%;max-width:none;border-radius:26px 26px 0 0;}
}

@media(max-width:420px){
  .rest-actions{width:100%;margin-left:0;margin-top:8px;}
  .rest-line{align-items:flex-start;flex-wrap:wrap;}
  .cal-head h3{font-size:18px;}
}

#content{
  position:relative;
  padding-top:58px;
}

#content:empty{
  padding-top:0;
}

.back{
  position:fixed;
  left:16px;
  top:76px;
  z-index:120;
  width:auto;
  min-width:46px;
  height:46px;
  padding:0 14px;
  border-radius:16px;
  background:#ffffff;
  border:1px solid rgba(31,41,51,.1);
  box-shadow:0 12px 28px rgba(31,41,51,.14);
}

.back::after{
  content:" Atrás";
  font-size:14px;
  font-weight:700;
}

@media(max-width:700px){
  #content{
    padding-top:54px;
  }

  .back{
    top:68px;
    left:12px;
    height:44px;
  }
}

button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:6px;
}

.menu button,
#auth button,
.modal-box button,
.card > button,
.change-photo-btn,
.dropdown button{
  margin-left:auto;
  margin-right:auto;
}

#auth button{
  width:100%;
}

.card > button:not(.back){
  min-width:160px;
}

.rest-top .plus-btn,
.cal-head .cal-nav,
.icon-btn,
.back{
  margin-left:0;
  margin-right:0;
  flex-shrink:0;
}

.rest-actions{
  align-items:center;
}

.rest-line{
  align-items:center;
}

@media(max-width:700px){
  .card > button:not(.back),
  .modal-box button{
    width:100%;
  }

  .rest-actions{
    justify-content:center;
  }
}

.obj-actions{
  float:none;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:6px;
  margin-left:auto;
  flex-shrink:0;
}

.user-card li{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  overflow:hidden;
}

.user-card li .obj-actions button{
  width:36px;
  height:36px;
  min-width:36px;
  padding:0;
  border-radius:12px;
}

@media(max-width:420px){
  .user-card li{
    align-items:flex-start;
    flex-direction:column;
  }

  .obj-actions{
    width:100%;
    justify-content:flex-end;
  }
}

.done .obj-actions,
.done .obj-actions button{
  text-decoration:none;
}

.done{
  text-decoration:none;
  opacity:.65;
}

.done::before{
  content:"✓ ";
  color:#2f9e44;
  font-weight:700;
}

.gate-card{
  width:min(460px,calc(100% - 32px));
  margin:46px auto 0;
}

.gate-card h1{
  margin:8px 0 18px;
  font-size:42px;
}

.gate-card label,
.settings-check{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  padding:12px;
  text-align:left;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
}

.gate-card input[type="checkbox"],
.settings-check input{
  width:auto;
  margin:0;
}

.settings-layout{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:18px;
  text-align:left;
}

.settings-nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.settings-nav button{
  width:100%;
  justify-content:flex-start;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:none;
}

.settings-panel{
  min-width:0;
}

.settings-panel ul{
  padding:0;
  margin:0 0 18px;
}

.settings-panel li{
  display:flex;
  align-items:center;
  gap:8px;
}

@media(max-width:700px){
  .settings-layout{
    grid-template-columns:1fr;
  }

  .settings-nav{
    flex-direction:row;
  }

 .settings-nav button{
    justify-content:center;
  }
}

.menu-order-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:12px 0 18px;
}

.menu-order-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 6px 18px rgba(31,41,51,.06);
}

.menu-order-item.dragging{
  opacity:.45;
}

.menu-order-item .settings-check{
  flex:1;
  margin:0;
}

.drag-handle{
  width:42px;
  height:42px;
  padding:0;
  border-radius:14px;
  cursor:grab;
  box-shadow:none;
  background:#fff;
  border:1px solid var(--line);
}

.drag-handle:active{
  cursor:grabbing;
}

.success-overlay{
  position:fixed;
  inset:0;
  z-index:2000;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(31,41,51,.36);
  backdrop-filter:blur(8px);
  animation:successFadeIn .18s ease forwards;
}

.success-box{
  width:min(280px,calc(100% - 48px));
  padding:28px 22px;
  border-radius:28px;
  background:#fff;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  animation:successPop .26s ease forwards;
}

.success-box h3{
  margin:0;
  font-size:18px;
  color:var(--text);
}

.success-ring{
  width:96px;
  height:96px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(81,207,102,.12);
}

.success-ring::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:4px solid rgba(81,207,102,.22);
  animation:successPulse .85s ease-out infinite;
}

.success-ring::after{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:4px solid #51cf66;
  border-top-color:transparent;
  animation:successSpin .65s ease forwards;
}

.success-check{
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#51cf66;
  color:#fff;
  font-size:34px;
  font-weight:700;
  transform:scale(0);
  animation:successCheck .28s ease .42s forwards;
}

.success-overlay.hide{
  animation:successFadeOut .22s ease forwards;
}

@keyframes successFadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes successFadeOut{
  from{opacity:1;}
  to{opacity:0;}
}

@keyframes successPop{
  from{transform:scale(.92);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes successPulse{
  from{transform:scale(.92);opacity:.9;}
  to{transform:scale(1.18);opacity:0;}
}

@keyframes successSpin{
  from{transform:rotate(-140deg);opacity:.4;}
  to{transform:rotate(45deg);opacity:1;}
}

@keyframes successCheck{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

.menu-order-item,
.drag-handle{
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

.drag-handle{
  touch-action:none;
}

.profile-settings-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  padding:8px 0 4px;
}

.profile-photo-editor{
  position:relative;
  width:122px;
  height:122px;
}

.settings-profile-photo{
  width:122px;
  height:122px;
  border-radius:34px;
  object-fit:cover;
  background:var(--surface-soft);
  border:5px solid #fff;
  box-shadow:0 14px 34px rgba(31,41,51,.18);
}

.photo-edit-btn{
  position:absolute;
  right:-4px;
  bottom:-4px;
  width:42px;
  height:42px;
  min-width:42px;
  padding:0;
  border-radius:15px;
  border:3px solid #fff;
  box-shadow:0 8px 20px rgba(31,41,51,.18);
}

.profile-settings-card input[type="text"]{
  text-align:center;
  font-weight:700;
  font-size:18px;
}

@media(max-width:700px){
  .modal-box .icon-btn{
    width:38px;
    min-width:38px;
    height:38px;
    padding:0;
    flex:0 0 38px;
  }

  .event-item .icon-btn{
    width:36px;
    min-width:36px;
    height:36px;
  }
}

.gym-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.gym-chart{
  display:flex;
  align-items:flex-end;
  gap:10px;
  min-height:190px;
  padding:18px 8px 8px;
  border-radius:18px;
  background:#fff;
  border:1px solid var(--line);
  overflow-x:auto;
}

.gym-bar-wrap{
  min-width:54px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.gym-bar{
  width:34px;
  min-height:8px;
  border-radius:12px 12px 6px 6px;
  background:linear-gradient(180deg,#4dabf7,#51cf66);
}

.gym-bar-label{
  font-size:11px;
  color:var(--muted);
  text-align:center;
}

.cal-event-chip{
  width:100%;
  max-width:100%;
  min-width:0;
  border-radius:7px;
  font-size:10px;
  padding:2px 4px;
  margin-top:3px;
  line-height:1.15;
  text-align:left;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  display:block;
}

.cal-more-chip{
  width:100%;
  max-width:100%;
  min-width:0;
  margin-top:3px;
  font-size:10px;
  font-weight:700;
  color:var(--muted);

  white-space:nowrap;
  overflow:hidden;

}

}

    grid-auto-rows:76px;

  .day{
    min-height:76px;
    height:76px;
    overflow:hidden;
  }

  .cal-event-chip{
    font-size:9px;
    padding:1px 3px;
    margin-top:2px;
  }

  .cal-more-chip{
    font-size:9px;
    margin-top:2px;
  }
}

.day > div{
  width:100%;
  min-width:0;
  overflow:hidden;
}

  padding:16px;
  margin:14px 0;

.gym-edit-label{

function compressImage(file,size=320,quality=.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}
canvas.width=w;
canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function normalizeData(){
  if(!data.roomName) data.roomName = "Nuestra App";
  if(!data.enabledMenus) data.enabledMenus = ["objetivos","planes","restaurantes","viajes","gym"];
  if(!data.users) data.users = {};
  if(!data.planes) data.planes = [];
  if(!data.restaurantes) data.restaurantes = [];
  if(!data.viajes) data.viajes = [];
  if(!data.gym) data.gym = {rutinas:[], registros:[]};
  if(!data.gym.rutinas) data.gym.rutinas = [];
  if(!data.gym.registros) data.gym.registros = [];

if(!data.enabledMenus.includes("gym")) data.enabledMenus.push("gym");
if(!data.userOrder) data.userOrder = Object.keys(data.users);

Object.keys(data.users).forEach(uid=>{
  if(!data.userOrder.includes(uid)){
    data.userOrder.push(uid);
  }
});

data.userOrder = data.userOrder.filter(uid=>data.users[uid]);

Object.values(data.users).forEach(u=>{
  if(!u.objetivos) u.objetivos = [];
  if(!u.menuOrder) u.menuOrder = [];
});
}
function loadData(){
  if(!roomCode) return;

  if(roomUnsubscribe) roomUnsubscribe();

  roomUnsubscribe = db.collection("rooms").doc(roomCode).onSnapshot(doc=>{
    if(doc.exists){
      data = doc.data();
      normalizeData();

      if(currentSection === ""){
        roomTitle.innerText = data.roomName || "Nuestra App";
      }

      renderMainMenu();

      const hasModalOpen = !!document.querySelector(".modal");

      if(!lockAutoRefresh && !hasModalOpen){
        refreshUI();
      }
    }
  });
}

async function saveData(){
  normalizeData();
  await db.collection("rooms").doc(roomCode).set(data);
}
function refreshUI(){

if(currentSection==="objetivos") renderObjetivos();

else if(currentSection==="restaurantes") renderRestaurantes();

else if(currentSection==="viajes") renderViajes();

else if(currentSection==="planes") renderPlanes();

else if(currentSection==="settings") renderSettings();

else if(currentSection==="roomSwitcher") renderRoomSwitcher();

else if(currentSection==="gym") renderGym();

}

async function register(){
  try{
    const email = emailInput.value.trim();
    const name = nameInput.value.trim();
    const pass = passInput.value.trim();
    const file = photoInput.files[0];

    if(!email || !name || !pass){
      alert("Rellena email, nombre y contraseña");
      return;
    }

    const credential = await authService.createUserWithEmailAndPassword(email, pass);

    let photo = "";
    if(file) photo = await compressImage(file);

    user = {
      uid: credential.user.uid,
      email,
      name,
      photo
    };

    await db.collection("profiles").doc(user.uid).set(user);

    localStorage.setItem("user", JSON.stringify(user));

    auth.style.display = "none";

const params = new URLSearchParams(location.search);
const codeFromLink = params.get("invitacion") || params.get("sala");

if(codeFromLink){
  await showInviteGate(codeFromLink);
  return;
}

roomGate.style.display = "block";
showRoomStart();
renderMyRoomsBox();

  }catch(error){
    alert("Error creando cuenta: " + error.message);
  }
}

async function loadProfileFromAuth(authUser){
  const profileRef = db.collection("profiles").doc(authUser.uid);
  const profileDoc = await profileRef.get();

  if(profileDoc.exists){
    user = profileDoc.data();
  }else{
    user = {
      uid: authUser.uid,
      email: authUser.email,
      name: authUser.email,
      photo: ""
    };

    await profileRef.set(user);
  }

  localStorage.setItem("user", JSON.stringify(user));
}



async function login(){
  try{
    const email = emailInput.value.trim();
    const pass = passInput.value.trim();

    if(!email || !pass){
      alert("Rellena email y contraseña");
      return;
    }

    const credential = await authService.signInWithEmailAndPassword(email, pass);
    await loadProfileFromAuth(credential.user);

    auth.style.display = "none";

const params = new URLSearchParams(location.search);
const codeFromLink = params.get("sala");

if(codeFromLink){
  await enterRoomByCode(codeFromLink);
  return;
}

roomGate.style.display = "block";
showRoomStart();
renderMyRoomsBox();

  }catch(error){
    alert("Error iniciando sesión: " + error.message);
  }
}

  roomGate.style.display = "none";
  auth.style.display = "none";

function showSection(section){

setHeaderTitle(AVAILABLE_MENUS[section]);

if(section==="objetivos"){
renderObjetivos();
return;
}

return;
}

if(section==="restaurantes"){
renderRestaurantes();
return;
}

if(section==="viajes"){
renderViajes();
return;
}

if(section==="gym"){

  return;

}

function ensureCurrentUserInRoom(){
  if(!data.users) data.users = {};
  if(!data.userOrder) data.userOrder = [];

  if(!data.users[user.uid]){
    data.users[user.uid] = {
      uid:user.uid,
      name:user.name,
      email:user.email,
      photo:user.photo || "",
      objetivos:[],
      menuOrder:[]
    };
  }

  if(!data.userOrder.includes(user.uid)){
    data.userOrder.push(user.uid);
  }
}

async function enterRoomByCode(code){
  const doc = await db.collection("rooms").doc(code).get();

  if(!doc.exists){
    alert("La sala del enlace no existe");
    roomGate.style.display = "block";
    return;
  }

  roomCode = code;
  data = doc.data();
  normalizeData();
  ensureCurrentUserInRoom();

  await saveData();

localStorage.setItem("roomCode", roomCode);
await rememberRoomForUser(roomCode, data.roomName);

  startApp();
}

/* PLANES CALENDARIO */
function renderPlanes(){
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const primerDia=new Date(currentYear,currentMonth,1).getDay();
const offset=(primerDia+6)%7;
const diasMes=new Date(currentYear,currentMonth+1,0).getDate();
const hoy=new Date();

let grid="";
for(let i=0;i<offset;i++) grid+=`<div class="day empty"></div>`;

for(let d=1;d<=diasMes;d++){
const fecha=formatDate(currentYear,currentMonth,d);
const eventos=data.planes.filter(x=>x.date===fecha);
const isToday=hoy.getDate()===d && hoy.getMonth()===currentMonth && hoy.getFullYear()===currentYear;

grid+=`
<div class="day ${isToday?'today':''}" onclick="openDay('${fecha}')">
${d}
<div style="margin-top:4px;">
${eventos.slice(0, window.innerWidth <= 700 ? 1 : 2).map(ev=>`
<div class="cal-event-chip" style="background:${ev.color||'#ffd43b'};">
  ${ev.title}
</div>
`).join("")}

${eventos.length > (window.innerWidth <= 700 ? 1 : 2) ? `
<div class="cal-more-chip">+${eventos.length - (window.innerWidth <= 700 ? 1 : 2)} más</div>
` : ""}
</div></div>`;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<div class="cal-head">
<button class="cal-nav" onclick="changeMonth(-1)">◀</button>
<h3>${meses[currentMonth]} ${currentYear}</h3>
<button class="cal-nav" onclick="changeMonth(1)">▶</button>
</div>

<div class="weekdays">
<div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div class="calendar-grid">
${grid}
</div>
</div>`;
}

function changeMonth(v){
currentMonth+=v;
if(currentMonth<0){currentMonth=11;currentYear--;}
if(currentMonth>11){currentMonth=0;currentYear++;}
renderPlanes();
}

function formatDate(y,m,d){
return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}

title:evTitulo.value.trim(),

<textarea id="rDesc" placeholder="Descripción"></textarea>
<input id="rPlatos" placeholder="Platos recomendados">
<input type="file" id="rFotos" multiple accept="image/*">

<button onclick="saveRestaurant()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
}

async function saveRestaurant(){
let fotos=[];

if(rFotos.files.length){
for(let f of rFotos.files){
fotos.push(await compressImage(f,600,.88));
}
}

data.restaurantes.push({
nombre:rNombre.value.trim(),
direccion:rDireccion.value.trim(),
descripcion:rDesc.value.trim(),
platos:rPlatos.value.trim(),
fotos:fotos,
user:user.name,
userUid:user.uid,
done:false,
valoraciones:[]
});

await saveData();
closeModal();
renderRestaurantes();
}

function openMoveViaje(i){

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Elegir fecha</h3>

<input type="date" id="fechaViaje">

<button onclick="moveViaje(${i})">Guardar</button>

</div>

}

async function deleteViaje(i){
if(!confirm("¿Eliminar viaje?")) return;
let viaje=data.viajes[i];

/* borrar del calendario si tenía fecha */
if(viaje.fecha){

data.planes = data.planes.filter(ev =>
!(
ev.date===viaje.fecha &&
ev.title==="✈️ "+viaje.nombre
)

);
}

/* borrar viaje */
data.viajes.splice(i,1);

await saveData();

closeModal();
renderViajes();
}

async function moveViaje(i){

let fecha=fechaViaje.value;

data.viajes[i].estado="proximo";
data.viajes[i].fecha=fecha;

data.planes.push({
date:fecha,
title:"✈️ "+data.viajes[i].nombre,
time:"",
place:data.viajes[i].nombre,
color:"#74c0fc",
desc:"Viaje programado",
user:user.name
});

await saveData();
closeModal();
renderViajes();
}



let estrellasViaje = 0;

function openFinishViaje(i){

estrellasViaje = 0;

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Finalizar viaje</h3>

<div>
<span class="star" onclick="setStarsViaje(1)">⭐</span>
<span class="star" onclick="setStarsViaje(2)">⭐</span>
<span class="star" onclick="setStarsViaje(3)">⭐</span>
<span class="star" onclick="setStarsViaje(4)">⭐</span>
<span class="star" onclick="setStarsViaje(5)">⭐</span>
</div>

<input id="precioFinalViaje" placeholder="Precio total">

<button onclick="finishViaje(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function finishViaje(i){

if(!estrellasViaje){
alert("Selecciona una valoración");
return;
}

if(!data.viajes[i].valoraciones)
data.viajes[i].valoraciones=[];

// borrar voto anterior del usuario
data.viajes[i].valoraciones =
data.viajes[i].valoraciones.filter(v=>v.user!==user.name);

// guardar nuevo voto
data.viajes[i].valoraciones.push({
user:user.name,
stars:estrellasViaje
});

// actualizar estado
data.viajes[i].estado="visitado";
data.viajes[i].precioFinal=precioFinalViaje.value;

await saveData();
closeModal();
renderViajes();
}

async function saveVoteViaje(i){

if(!estrellasViaje){
alert("Selecciona una valoración");
return;
}

if(!data.viajes[i].valoraciones)
data.viajes[i].valoraciones=[];

// quitar voto anterior del usuario
data.viajes[i].valoraciones =
data.viajes[i].valoraciones.filter(v=>v.user!==user.name);

// añadir nuevo voto
data.viajes[i].valoraciones.push({
user:user.name,
stars:estrellasViaje
});

await saveData();
closeModal();
renderViajes();
}

let gymOpenRoutines = {};
let gymDraftRoutine = null;
let gymEditingIndex = null;
let showSharedGymRoutines = localStorage.getItem("showSharedGymRoutines") === "true";

function renderGym(){
  lockAutoRefresh = false;

  const misRutinas = (data.gym?.rutinas || []).filter(r=>r.userUid === user.uid);
  const compartidas = (data.gym?.rutinas || []).filter(r=>r.userUid !== user.uid && r.isPublic);

  content.innerHTML = `
    <button class="back" onclick="goBack()">⬅</button>

    <div class="card">
      <button onclick="openCreateGymRoutine()">Crear Rutina</button>

      <h3 style="text-align:left;margin-top:24px;">Mis rutinas</h3>

      <div style="text-align:left;">
        ${misRutinas.length ? misRutinas.map(rutina=>{
          const originalIndex = data.gym.rutinas.indexOf(rutina);
          const open = gymOpenRoutines[rutina.id];

          return `
            <div class="rest-item">
              <div style="display:flex;align-items:center;gap:10px;">
                <button class="icon-btn" onclick="toggleGymRoutine('${rutina.id}')">${open ? "▼" : "▶"}</button>
                <b style="flex:1;">${rutina.title}</b>
                <button class="icon-btn" onclick="openEditGymRoutine(${originalIndex})">✏️</button>
                <button class="icon-btn" onclick="deleteGymRoutine(${originalIndex})">🗑️</button>
              </div>

              <div class="gym-actions">
                <button onclick="toggleGymPublic(${originalIndex})">
                  ${rutina.isPublic ? "Dejar de compartir" : "Compartir"}
                </button>
              </div>

              ${open ? renderGymRoutineDetail(rutina, originalIndex, true) : ""}
            </div>
          `;
        }).join("") : "<p>No tienes rutinas creadas todavía</p>"}
      </div>

      <hr>

      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;">
        <h3 style="margin:0;">Rutinas compartidas</h3>
        <button onclick="toggleSharedGymView()">${showSharedGymRoutines ? "Ocultar" : "Ver"}</button>
      </div>

      ${showSharedGymRoutines ? `
        <div style="text-align:left;margin-top:12px;">
          ${compartidas.length ? compartidas.map(rutina=>{
            const originalIndex = data.gym.rutinas.indexOf(rutina);
            const open = gymOpenRoutines[originalIndex];

            return `
              <div class="rest-item">
                <div style="display:flex;align-items:center;gap:10px;">
                  <button class="icon-btn" onclick="toggleGymRoutine(${originalIndex})">${open ? "▼" : "▶"}</button>
                  <div style="flex:1;">
                    <b>${rutina.title}</b><br>
                    <small>Compartida por ${rutina.user || "Usuario"}</small>
                  </div>
                </div>

                ${open ? renderGymRoutineDetail(rutina, originalIndex, false) : ""}
              </div>
            `;
          }).join("") : "<p>No hay rutinas compartidas todavía</p>"}
        </div>
      ` : ""}
    </div>
  `;
}

function renderGymRoutineDetail(rutina, originalIndex, owner){
  return `
    <div style="margin-top:12px;">
      ${rutina.days.map(day=>`
        <div style="margin:12px 0;padding:12px;border-radius:14px;background:#fffaf0;border:1px solid var(--line);">
          <b>${day.name || "Día sin nombre"}</b>
          <ul style="padding:0;margin:10px 0 0;">
            ${day.exercises.map(ex=>`<li>${ex}</li>`).join("")}
          </ul>
        </div>
      `).join("")}

      ${owner ? `
        <div class="gym-actions">
          <button onclick="openGymRegister(${originalIndex})">Registro</button>
          <button onclick="openGymStats(${originalIndex})">Estadística</button>
        </div>
      ` : ""}
    </div>
  `;
}

async function toggleGymPublic(index){
  data.gym.rutinas[index].isPublic = !data.gym.rutinas[index].isPublic;
  await saveData();
  renderGym();
}

function toggleSharedGymView(){
  showSharedGymRoutines = !showSharedGymRoutines;
  localStorage.setItem("showSharedGymRoutines", showSharedGymRoutines);
  renderGym();
}

function openEditGymRoutine(index){
  lockAutoRefresh = true;
  gymEditingIndex = index;

  const rutina = data.gym.rutinas[index];

  gymDraftRoutine = JSON.parse(JSON.stringify({
    title:rutina.title,
    days:rutina.days || []
  }));

  renderCreateGymRoutine();
}

async function deleteGymRoutine(index){
  const rutina = data.gym.rutinas[index];

  const ok = confirm("¿Seguro que quieres eliminar esta rutina? También se eliminarán sus registros.");

  if(!ok) return;

  const routineId = rutina.id || "";

  data.gym.rutinas.splice(index,1);

  data.gym.registros = (data.gym.registros || []).filter(reg=>{
    if(routineId && reg.routineId){
      return reg.routineId !== routineId;
    }

    return !(reg.routineTitle === rutina.title && reg.userUid === user.uid);
  });

  await saveData();
  renderGym();
}

function renderCreateGymRoutine(){
  content.innerHTML = `
    <button class="back" onclick="cancelGymRoutine()">⬅</button>

    <div class="card">
      <h3>${gymEditingIndex === null ? "Crear rutina" : "Editar rutina"}</h3>

      <label class="gym-edit-label">Nombre de la rutina</label>
      <input id="gymRoutineTitle" value="${gymDraftRoutine.title || ""}" placeholder="Título de la rutina">

      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;">
        <h3 style="margin:0;">Días</h3>
        <button class="plus-btn" onclick="addGymDay()">+</button>
      </div>

      <div style="text-align:left;margin-top:14px;">
        ${gymDraftRoutine.days.map((day,dayIndex)=>`
          <div class="gym-edit-day">
            <label class="gym-edit-label">Nombre del día</label>

            <div class="gym-edit-day-title">
              <input value="${day.name || ""}" placeholder="Ej: Pecho y tríceps" oninput="gymDraftRoutine.days[${dayIndex}].name=this.value">
              <button class="icon-btn" onclick="removeGymDay(${dayIndex})">🗑️</button>
            </div>

            <label class="gym-edit-label">Ejercicios</label>

            ${(day.exercises || []).map((ex,exIndex)=>`
              <div class="gym-edit-exercise">
                <input value="${ex}" placeholder="Ejercicio" oninput="updateGymExercise(${dayIndex},${exIndex},this.value)">
                <button class="icon-btn" onclick="removeGymExercise(${dayIndex},${exIndex})">❌</button>
              </div>
            `).join("")}

            <div style="display:flex;gap:8px;align-items:center;margin-top:12px;">
              <input id="gymExerciseInput${dayIndex}" placeholder="Añadir ejercicio">
              <button class="icon-btn" onclick="addGymExercise(${dayIndex})">✔</button>
            </div>
          </div>
        `).join("")}
      </div>

      <button onclick="saveGymRoutine()">Guardar cambios</button>
      <button onclick="cancelGymRoutine()">Cancelar</button>
    </div>
  `;
}

function addGymDay(){
  gymDraftRoutine.title = gymRoutineTitle?.value || gymDraftRoutine.title;

  gymDraftRoutine.days.push({
    name:"",
    exercises:[]
  });

  renderCreateGymRoutine();
}

function addGymExercise(dayIndex){
  const input = document.getElementById("gymExerciseInput" + dayIndex);
  const text = input.value.trim();

  if(!text) return;

  gymDraftRoutine.days[dayIndex].exercises.push(text);
  input.value = "";

  renderCreateGymRoutine();
}

async function saveGymRoutine(){
  const title = gymRoutineTitle.value.trim();

  if(!title){
    alert("Pon un título a la rutina");
    return;
  }

  if(!gymDraftRoutine.days.length){
    alert("Añade al menos un día");
    return;
  }

  gymDraftRoutine.days.forEach((day,index)=>{
    if(!day.name) day.name = "Día " + (index + 1);
    if(!day.exercises) day.exercises = [];
  });

  if(gymEditingIndex === null){
    data.gym.rutinas.push({
      id:"rutina-" + Date.now(),
      title,
      days:gymDraftRoutine.days,
      userUid:user.uid,
      user:user.name,
      createdAt:Date.now()
    });
  }else{
    const oldRoutine = data.gym.rutinas[gymEditingIndex];

    data.gym.rutinas[gymEditingIndex] = {
      ...oldRoutine,
      title,
      days:gymDraftRoutine.days,
      updatedAt:Date.now()
    };
  }

gymDraftRoutine.days.forEach(day=>{
  day.exercises = (day.exercises || []).map(x=>x.trim()).filter(Boolean);
});
  await saveData();

  gymDraftRoutine = null;
  gymEditingIndex = null;

  renderGym();
}

function openGymStats(routineIndex){
  lockAutoRefresh = true;

  const rutina = data.gym.rutinas[routineIndex];
  const exercises = [...new Set(
    rutina.days.flatMap(day=>day.exercises || [])
  )];

  content.innerHTML = `
    <button class="back" onclick="renderGym()">⬅</button>

    <div class="card">
      <h3>Estadística</h3>
      <p>${rutina.title}</p>

      ${exercises.length ? `
        <select id="gymStatsExercise" onchange="renderGymStatsChart(${routineIndex})">
          ${exercises.map(ex=>`
            <option value="${ex}">${ex}</option>
          `).join("")}
        </select>

        <select id="gymStatsUnit" onchange="renderGymStatsChart(${routineIndex})">
          <option value="kg">kg</option>
          <option value="minutos">minutos</option>
          <option value="segundos">segundos</option>
          <option value="metros">metros</option>
          <option value="km">km</option>
          <option value="calorías">calorías</option>
        </select>

        <div id="gymStatsChart" style="margin-top:18px;"></div>
      ` : "<p>Esta rutina no tiene ejercicios todavía</p>"}

      <button onclick="renderGym()">Salir</button>
    </div>
  `;

  setTimeout(()=>{
    renderGymStatsChart(routineIndex);
  },50);
}

function renderGymStatsChart(routineIndex){
  const chart = document.getElementById("gymStatsChart");
  if(!chart) return;

  const rutina = data.gym.rutinas[routineIndex];
  const exercise = gymStatsExercise.value;
  const unit = gymStatsUnit.value;

  const routineId = rutina.id || "";

  const registros = (data.gym.registros || [])
    .filter(reg=>{
      if(reg.userUid !== user.uid) return false;

      if(routineId && reg.routineId){
        return reg.routineId === routineId;
      }

      return reg.routineTitle === rutina.title;
    })
    .flatMap(reg=>{
      return (reg.entries || [])
        .filter(entry=>entry.exercise === exercise && entry.unit === unit && entry.value !== "")
        .map(entry=>({
          value:Number(entry.value),
          date:reg.date,
          dayName:reg.dayName || "Día"
        }));
    })
    .filter(x=>!isNaN(x.value));

  if(!registros.length){
    chart.innerHTML = `
      <div class="rest-item">
        No hay registros de <b>${exercise}</b> en <b>${unit}</b> todavía.
      </div>
    `;
    return;
  }

  const max = Math.max(...registros.map(x=>x.value),1);

  chart.innerHTML = `
    <div class="rest-item">
      <b>${exercise}</b><br>
      <small>Mostrando evolución en ${unit}</small>
    </div>

    <div class="gym-chart">
      ${registros.map(reg=>{
        const height = Math.max((reg.value / max) * 150, 8);
        const date = new Date(reg.date);
        const label = date.toLocaleDateString("es-ES", {day:"2-digit", month:"2-digit"});

        return `
          <div class="gym-bar-wrap">
            <div style="font-size:12px;font-weight:700;">${reg.value}${unit}</div>
            <div class="gym-bar" style="height:${height}px;"></div>
            <div class="gym-bar-label">${label}<br>${reg.dayName}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function cancelGymRoutine(){
  const ok = confirm("¿Seguro que quieres cancelar? No se guardarán los cambios.");

  if(!ok) return;

  gymDraftRoutine = null;
  gymEditingIndex = null;
  renderGym();
}

lockAutoRefresh = true;
  const rutina = data.gym.rutinas[routineIndex];

    <div class="card">

            ${day.name || "Día " + (dayIndex + 1)}

                <option value="calorías">calorías</option>

            </div>

      <button onclick="saveGymRegister(${routineIndex},${dayIndex})">Guardar</button>

function animateProgressBars(){
  document.querySelectorAll(".progress").forEach(el=>{
    const userName = el.dataset.user;
    const target = Number(el.dataset.progress || 0);
    let current = lastProgressByUser[userName];

    if(current === undefined){
      current = target;
      el.style.setProperty("--progress", target + "%");
      lastProgressByUser[userName] = target;
      return;
    }

    if(Math.abs(target - current) < 0.5){
      el.style.setProperty("--progress", target + "%");
      lastProgressByUser[userName] = target;
      return;
    }

    function step(){
      current += (target - current) * 0.12;

      if(Math.abs(target - current) < 0.5){
        current = target;
      }

      el.style.setProperty("--progress", current + "%");

      if(current !== target){
        requestAnimationFrame(step);
      }else{
        lastProgressByUser[userName] = target;
      }
    }

    step();
  });
}

  if(!user || !user.uid || !code) return;

  const roomInfo = {

  };

  saveRoomToList(code, roomInfo.name);

  await db.collection("profiles").doc(user.uid).set({
    rooms: firebase.firestore.FieldValue.arrayUnion(roomInfo)

async function getUserRooms(){
  if(!user || !user.uid) return getSavedRooms();

  const profileDoc = await db.collection("profiles").doc(user.uid).get();
  const profileRooms = profileDoc.exists ? (profileDoc.data().rooms || []) : [];
  const localRooms = getSavedRooms();

  const allRooms = [...profileRooms, ...localRooms];
  const unique = [];

  allRooms.forEach(room=>{
    if(room && room.code && !unique.some(x=>x.code === room.code)){
      unique.push(room);
    }
  });

  return unique;
}

async function leaveRoom(code){
  const doc = await db.collection("rooms").doc(code).get();

  if(doc.exists){
    const roomData = doc.data();

    if(roomData.users && user && user.uid){
      delete roomData.users[user.uid];
    if(roomData.userOrder){
      roomData.userOrder = roomData.userOrder.filter(uid=>uid !== user.uid);
}
    }

    if(roomData.restaurantes){
      roomData.restaurantes.forEach(r=>{
        if(r.valoraciones){
          r.valoraciones = r.valoraciones.filter(v=>v.user !== user.name);
        }
      });
    }

    if(roomData.viajes){
      roomData.viajes.forEach(viaje=>{
        if(viaje.valoraciones){
          viaje.valoraciones = viaje.valoraciones.filter(v=>v.user !== user.name);
        }
      });
    }

    await db.collection("rooms").doc(code).set(roomData);
  }

  let rooms = getSavedRooms().filter(r=>r.code !== code);
  localStorage.setItem("savedRooms", JSON.stringify(rooms));

  if(user && user.uid){
    const profileRef = db.collection("profiles").doc(user.uid);
    const profileDoc = await profileRef.get();

    if(profileDoc.exists){
      const profileData = profileDoc.data();
      const updatedRooms = (profileData.rooms || []).filter(r=>r.code !== code);

      await profileRef.set({
        rooms: updatedRooms
      }, {merge:true});
    }
  }

  if(roomCode === code){
    localStorage.removeItem("roomCode");
    roomCode = null;
data = {
  users:{},
  planes:[],
  restaurantes:[],
  viajes:[],
  gym:{
    rutinas:[],
    registros:[]
  }
};

    app.style.display = "none";
    roomGate.style.display = "block";
    showRoomStart();
    await renderMyRoomsBox();
    return;
  }

  renderRoomSwitcher();
}

        <span>${AVAILABLE_MENUS[key]}</span>
      </label>
      <button class="drag-handle" type="button">☰</button>
    </div>
  `).join("")}
</div>

<button onclick="saveRoomSettings()">Guardar sala</button>
          </div>
        </div>
      </div>
    </div>
  `;

setTimeout(setupMenuDrag, 50);
}

function setupMenuDrag(){
  const list = document.getElementById("menuOrderList");
  if(!list) return;

  let draggedItem = null;
  let activePointerId = null;

  list.querySelectorAll(".drag-handle").forEach(handle=>{
    handle.addEventListener("pointerdown", e=>{
      e.preventDefault();

      draggedItem = handle.closest(".menu-order-item");
      activePointerId = e.pointerId;

      draggedItem.classList.add("dragging");
      handle.setPointerCapture(activePointerId);

      document.addEventListener("pointermove", onPointerMove, {passive:false});
      document.addEventListener("pointerup", onPointerUp);
      document.addEventListener("pointercancel", onPointerUp);
    });
  });

  function onPointerMove(e){
    if(!draggedItem) return;

    e.preventDefault();

    const afterElement = getDragAfterElement(list, e.clientY);

    if(afterElement == null){
      list.appendChild(draggedItem);
    }else{
      list.insertBefore(draggedItem, afterElement);
    }
  }

  function onPointerUp(){
    if(draggedItem){
      draggedItem.classList.remove("dragging");
    }

    draggedItem = null;
    activePointerId = null;

    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", onPointerUp);
    document.removeEventListener("pointercancel", onPointerUp);
  }
}

function getDragAfterElement(container, y){
  const draggableElements = [...container.querySelectorAll(".menu-order-item:not(.dragging)")];

  return draggableElements.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;

    if(offset < 0 && offset > closest.offset){
      return {
        offset,
        element:child
      };
    }

    return closest;
  }, {
    offset:Number.NEGATIVE_INFINITY,
    element:null
  }).element;
}

function showSettingsTab(id){
  profileSettings.style.display = id === "profileSettings" ? "block" : "none";
  roomSettings.style.display = id === "roomSettings" ? "block" : "none";
}

function previewSettingsPhoto(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = e=>{
    settingsPhotoPreview.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

async function saveProfileSettings(){
  const newName = settingsName.value.trim();
  const file = settingsPhotoInput.files[0];

  if(!newName){
    alert("El nombre no puede estar vacío");
    return;
  }

  let photo = user.photo || getUserPhoto(user.uid);

  if(file){
    photo = await compressImage(file,320,.85);
  }

  user.name = newName;
  user.photo = photo;

  await db.collection("profiles").doc(user.uid).set(user, {merge:true});
  localStorage.setItem("user", JSON.stringify(user));

  if(data.users[user.uid]){
    data.users[user.uid].name = newName;
    data.users[user.uid].photo = photo;
  }

  await saveData();

  if(menuUser) menuUser.innerText = user.name;
  if(menuPhoto) menuPhoto.src = photo;

  showSuccessOverlay("Perfil guardado");
  renderSettings();
}
  
function showSuccessOverlay(text="Guardado"){
  document.querySelectorAll(".success-overlay").forEach(x=>x.remove());

  document.body.insertAdjacentHTML("beforeend",`
    <div class="success-overlay">
      <div class="success-box">
        <div class="success-ring">
          <div class="success-check">✓</div>
        </div>
        <h3>${text}</h3>
      </div>
    </div>
  `);

  setTimeout(()=>{
    document.querySelectorAll(".success-overlay").forEach(x=>x.classList.add("hide"));
  },1200);

  setTimeout(()=>{
    document.querySelectorAll(".success-overlay").forEach(x=>x.remove());
  },1550);
}


async function saveRoomSettings(){
  const selected = [...document.querySelectorAll(".settingsMenuCheck:checked")].map(x=>x.value);

  if(!selected.length){
    alert("La sala necesita al menos un menú");
    return;
  }

  const orderedMenus = [...document.querySelectorAll(".menu-order-item")]
    .map(x=>x.dataset.menu);

  data.roomName = settingsRoomName.value.trim() || "Nuestra App";
  data.enabledMenus = selected;

if(!data.users[user.uid]){
  data.users[user.uid] = {
    uid:user.uid,
    name:user.name,
    email:user.email,
    photo:user.photo || "",
    objetivos:[],
    menuOrder:[]
  };
}

  data.users[user.uid].menuOrder = orderedMenus;

  await saveData();

  roomTitle.innerText = data.roomName;
  renderMainMenu();

showSuccessOverlay("Configuración guardada");
renderSettings();
}

async function showInviteGate(code){
  const doc = await db.collection("rooms").doc(code).get();

  if(!doc.exists){
    alert("La invitación no es válida o la sala ya no existe.");
    roomGate.style.display = "block";
    return;
  }

  pendingInviteCode = code;
  pendingInviteData = doc.data();

  hideAllScreens();

  inviteRoomName.innerText = pendingInviteData.roomName || "Sala sin nombre";
  inviteRoomCodeText.innerText = "Código: " + code;

  inviteGate.style.display = "block";
}

async function acceptInvite(){
  if(!pendingInviteCode) return;

  const authUser = authService.currentUser;

  if(!authUser){
    hideAllScreens();
    auth.style.display = "block";
    return;
  }

  await loadProfileFromAuth(authUser);
  await enterRoomByCode(pendingInviteCode);

  pendingInviteCode = null;
  pendingInviteData = null;
}

async function rejectInvite(){
  pendingInviteCode = null;
  pendingInviteData = null;

  const url = new URL(location.href);
  url.searchParams.delete("sala");
  history.replaceState({}, "", url.toString());

  hideAllScreens();

  if(authService.currentUser){
    roomGate.style.display = "block";
showRoomStart();
renderMyRoomsBox();
  }else{
    auth.style.display = "block";
  }
}

  roomGate.style.display = "block";
  showRoomStart();
  renderMyRoomsBox();
}

function updateGymExercise(dayIndex, exIndex, value){
  gymDraftRoutine.days[dayIndex].exercises[exIndex] = value;
}

function removeGymExercise(dayIndex, exIndex){
  gymDraftRoutine.days[dayIndex].exercises.splice(exIndex,1);
  renderCreateGymRoutine();
}

function removeGymDay(dayIndex){
  const ok = confirm("¿Eliminar este día de la rutina?");
  if(!ok) return;

  gymDraftRoutine.days.splice(dayIndex,1);
  renderCreateGymRoutine();
}

function toggleGymRoutine(id){
    gymOpenRoutines[id] = !gymOpenRoutines[id];
    renderGym();
}

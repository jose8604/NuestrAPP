<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fdf6e3;
text-align:center;
overflow-x:hidden;
}
header{
background:#ffe066;
padding:15px;
font-weight:bold;
position:relative;
font-size:18px;
}
.menu-btn{
position:absolute;
left:10px;
top:10px;
font-size:22px;
cursor:pointer;
}
.dropdown{
display:none;
position:absolute;
top:55px;
left:10px;
background:white;
border-radius:16px;
padding:18px;
width:220px;
max-width:90vw;
box-shadow:0 6px 16px rgba(0,0,0,.15);
z-index:99;
}
.profile-box{text-align:center;margin-bottom:15px;}
.profile-photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffe066;
}
.change-photo-btn{
margin-top:10px;
font-size:13px;
width:100%;
}
.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}
.menu button{
background:#fff3bf;
border:none;
border-radius:20px;
padding:22px;
font-size:16px;
width:100%;
}
.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
position:relative;
max-width:100%;
overflow:hidden;
}
input,textarea,select{
margin:8px 0;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
width:100%;
font-size:15px;
}
button{
background:#ffe066;
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
}
li{
background:#fff9db;
margin:10px 0;
padding:12px;
border-radius:12px;
list-style:none;
text-align:left;
}
.back{
position:absolute;
left:10px;
top:10px;
}
.user-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.progress{
width:72px;
height:72px;
border-radius:50%;
background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.progress img{
width:56px;
height:56px;
border-radius:50%;
object-fit:cover;
}
.done{text-decoration:line-through;opacity:.6;}
.small-photo{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
margin-right:8px;
}
.post-img{
width:100%;
max-width:220px;
border-radius:12px;
margin-top:10px;
display:block;
}
.obj-actions{float:right;}
.users-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}
.user-card{
background:#fffdf4;
border-radius:16px;
padding:12px;
text-align:left;
min-width:0;
}
.user-card ul{padding:0;margin:0;}
.rest-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}
.rest-col{
background:#fffdf4;
padding:12px;
border-radius:16px;
text-align:left;
}
.rest-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.plus-btn{
width:42px;
height:42px;
border-radius:50%;
font-size:24px;
padding:0;
}
.rest-item{
background:#fff9db;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.rest-line{
display:flex;
align-items:center;
gap:8px;
}
.rest-actions{
margin-left:auto;
display:flex;
gap:6px;
}
.star{
font-size:24px;
cursor:pointer;
opacity:.4;
}
.star.active{opacity:1;}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
.modal-box{
background:white;
width:92%;
max-width:420px;
border-radius:18px;
padding:18px;
max-height:90vh;
overflow:auto;
}
.icon-btn{
width:38px;
height:38px;
border-radius:50%;
padding:0;
font-size:18px;
}

/* NUEVO CALENDARIO */
.cal-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
gap:10px;
}
.cal-title{
font-size:20px;
font-weight:bold;
flex:1;
}
.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}
.cal-dayname{
font-weight:bold;
font-size:13px;
padding:6px 0;
}
.cal-day{
background:#fff9db;
border-radius:14px;
padding:10px 4px;
min-height:58px;
cursor:pointer;
position:relative;
}
.cal-day:hover{transform:scale(1.02);}
.cal-empty{
background:transparent;
}
.dot{
width:8px;
height:8px;
border-radius:50%;
margin:4px auto 0;
}
.event-box{
background:#fff9db;
padding:10px;
border-radius:14px;
margin:10px 0;
text-align:left;
}

@media(max-width:700px){
.menu{grid-template-columns:1fr;padding:15px;}
.users-grid{grid-template-columns:1fr;}
.rest-wrap{grid-template-columns:1fr;}
.card{margin:10px;padding:16px;}
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">📷 Cambiar foto</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="auth">
<h2>Iniciar sesión</h2>
<input id="nameInput" placeholder="Usuario">
<input id="passInput" type="password" placeholder="Contraseña">
<input id="photoInput" type="file" accept="image/*">
<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">
<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Calendario</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>
<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"nuestrapp-3329a.firebaseapp.com",
projectId:"nuestrapp-3329a",
storageBucket:"nuestrapp-3329a.firebasestorage.app",
messagingSenderId:"11964303180",
appId:"1:11964303180:web:28412e809348d20d6af1e9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=null;
let selectedStars=0;

let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();

let data={
users:{},
planes:[],
restaurantes:[],
sitios:[]
};

function toggleMenu(){
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
if(user && data.users[user.name]){
menuUser.innerText=user.name;
menuPhoto.src=data.users[user.name].photo||"";
}
}

function closeMenu(){dropdown.style.display="none";}
function logout(){localStorage.removeItem("user");location.reload();}

function compressImage(file,size=320,quality=.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}
canvas.width=w;
canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function loadData(){
db.collection("app").doc("data").onSnapshot(doc=>{
if(doc.exists){
data=doc.data();
if(!data.restaurantes)data.restaurantes=[];
if(!data.planes)data.planes=[];
}
});
}

async function saveData(){
await db.collection("app").doc("data").set(data);
}

async function register(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();
const file=photoInput.files[0];
if(!name||!pass)return;

let photo="";
if(file)photo=await compressImage(file);

data.users[name]={name,password:pass,photo,objetivos:[]};
await saveData();

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

async function login(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();

const doc=await db.collection("app").doc("data").get();
if(doc.exists)data=doc.data();

if(!data.users[name]) return alert("No existe");
if(data.users[name].password!==pass) return alert("Contraseña incorrecta");

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

function startApp(){
auth.style.display="none";
app.style.display="block";
loadData();
}

function goBack(){
content.innerHTML="";
mainMenu.style.display="grid";
}

function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){renderObjetivos();return;}
if(section==="restaurantes"){renderRestaurantes();return;}
if(section==="planes"){renderCalendario();return;}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<input id="newItem" placeholder="Escribe algo">
<button onclick="addItem('${section}')">Añadir</button>
<ul>
${data[section].map((item,i)=>`
<li>
<b>${item.user}</b><br>
${item.text}
<br><button onclick="removeItem('${section}',${i})">❌</button>
</li>
`).join("")}
</ul>
</div>`;
}

/* =======================
   NUEVO CALENDARIO
======================= */

function renderCalendario(){
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const dias=["L","M","X","J","V","S","D"];

const first=new Date(currentYear,currentMonth,1);
const last=new Date(currentYear,currentMonth+1,0);

let startDay=first.getDay();
if(startDay===0)startDay=7;

let html=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<div class="cal-head">
<button onclick="changeMonth(-1)">⬅</button>
<div class="cal-title">${meses[currentMonth]} ${currentYear}</div>
<button onclick="changeMonth(1)">➡</button>
</div>

<div class="cal-grid">
${dias.map(d=>`<div class="cal-dayname">${d}</div>`).join("")}
`;

for(let i=1;i<startDay;i++){
html+=`<div class="cal-day cal-empty"></div>`;
}

for(let day=1;day<=last.getDate();day++){
const key=getDateKey(day);
const events=data.planes.filter(e=>e.date===key);

html+=`
<div class="cal-day" onclick="openDay(${day})">
${day}
${events[0]?`<div class="dot" style="background:${events[0].color||'#ff6b6b'}"></div>`:''}
</div>`;
}

html+=`</div></div>`;
content.innerHTML=html;
}

function changeMonth(step){
currentMonth+=step;
if(currentMonth<0){currentMonth=11;currentYear--;}
if(currentMonth>11){currentMonth=0;currentYear++;}
renderCalendario();
}

function getDateKey(day){
return currentYear+"-"+String(currentMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
}

function openDay(day){
const key=getDateKey(day);
const eventos=data.planes.filter(e=>e.date===key);

content.innerHTML=`
<button class="back" onclick="renderCalendario()">⬅</button>
<div class="card">
<h3>${key}</h3>

<input id="evTitle" placeholder="Evento">
<input id="evHour" type="time">
<input id="evPlace" placeholder="Lugar">
<input id="evColor" type="color" value="#ff6b6b">
<textarea id="evDesc" placeholder="Descripción"></textarea>

<button onclick="saveEvent('${key}')">Guardar evento</button>

<div style="margin-top:15px">
${eventos.map((e,i)=>`
<div class="event-box" style="border-left:6px solid ${e.color}">
<div style="display:flex;align-items:center;gap:8px">
<img class="small-photo" src="${data.users[e.user]?.photo||''}">
<b>${e.title}</b>
</div>
<div>🕒 ${e.hour||'-'}</div>
<div>📍 ${e.place||'-'}</div>
<div>${e.desc||''}</div>
<small>Creado por ${e.user}</small><br>
<button onclick="removeEvent(${data.planes.indexOf(e)})">❌</button>
</div>
`).join("") || "<p>Sin eventos</p>"}
</div>
</div>`;
}

async function saveEvent(date){
const title=evTitle.value.trim();
if(!title)return;

data.planes.push({
date,
title,
hour:evHour.value,
place:evPlace.value.trim(),
color:evColor.value,
desc:evDesc.value.trim(),
user:user.name
});

await saveData();
openDay(parseInt(date.split("-")[2]));
}

async function removeEvent(i){
data.planes.splice(i,1);
await saveData();
renderCalendario();
}

/* =======================
   RESTO ORIGINAL
======================= */

function renderObjetivos(){
content.innerHTML=`<button class="back" onclick="goBack()">⬅</button>
<div class="card">Objetivos sin cambios</div>`;
}

function renderRestaurantes(){
content.innerHTML=`<button class="back" onclick="goBack()">⬅</button>
<div class="card">Restaurantes sin cambios</div>`;
}

async function addItem(section){
const text=newItem.value.trim();
if(!text)return;
data[section].push({text,user:user.name});
await saveData();
showSection(section);
}

function removeItem(section,i){
data[section].splice(i,1);
saveData();
showSection(section);
}

document.addEventListener("DOMContentLoaded",()=>{
loadData();
const saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
startApp();
}
});
</script>

</body>
</html>

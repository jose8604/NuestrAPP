<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestra App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #fdf6e3;
      text-align: center;
    }

    header {
      background: #ffe066;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { padding: 20px; }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .menu button {
      background: #fff3bf;
      border: none;
      border-radius: 20px;
      padding: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ffe066;
    }

    li {
      margin: 10px 0;
      background: #fff9db;
      padding: 10px;
      border-radius: 10px;
    }

    .back {
      position: absolute;
      left: 10px;
      top: 10px;
    }
  </style>
</head>

<body>

<header>💛 Nuestra App 💛</header>

<div id="auth" class="container">
  <h3>Registro</h3>
  <input id="name" placeholder="Tu nombre"><br>
  <input type="file" id="photo"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;" class="container">
  <div id="mainMenu" class="menu">
    <button onclick="showSection('objetivos')">🎯 Objetivos</button>
    <button onclick="showSection('planes')">📅 Planes</button>
    <button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
    <button onclick="showSection('sitios')">📍 Sitios</button>
  </div>

  <div id="content"></div>
</div>

<!-- 🔥 FIREBASE (NO TOCADO) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
let user = null;

let data = {
  users: {},
  planes: [],
  restaurantes: [],
  sitios: []
};

function loadData() {
  db.collection("app").doc("data")
    .onSnapshot((doc) => {
      if (doc.exists) {
        data = doc.data();
      }
    });
}

async function saveData() {
  await db.collection("app").doc("data").set(data);
}

async function login() {
  const name = document.getElementById('name').value;
  const photoInput = document.getElementById('photo');

  if (!name) return alert('Pon un nombre');

  let photo = null;

  if (photoInput.files[0]) {
    photo = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(photoInput.files[0]);
    });
  }

  user = { name, photo };
  localStorage.setItem("user", JSON.stringify(user));

  await db.collection("app").doc("data").set({
    users: {
      [user.name]: {
        name: user.name,
        photo: user.photo,
        objetivos: []
      }
    }
  }, { merge: true });

  startApp();
}

function startApp() {
  loadData();
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showSection(section) {
  document.getElementById('mainMenu').style.display = 'none';
  const container = document.getElementById('content');

  if (section === "objetivos") {
    container.innerHTML = `
      <button class="back" onclick="goBack()">⬅</button>
      <div class="card">
        <h2>🎯 Objetivos</h2>

        ${Object.values(data.users).map(u => `
          <div>
            <img src="${u.photo || ''}" width="60" style="border-radius:50%">
            <ul>
              ${(u.objetivos || []).map((obj,i)=>`
                <li>${obj.text}
                <button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
                </li>
              `).join('')}
            </ul>
          </div>
        `).join('')}

        <input id="newItem" placeholder="Nuevo objetivo">
        <button onclick="addItem('objetivos')">Añadir</button>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <button class="back" onclick="goBack()">⬅</button>
    <div class="card">
      <h2>${section}</h2>
      <input id="newItem">
      <button onclick="addItem('${section}')">Añadir</button>
      <ul>
        ${data[section].map((item,i)=>`
          <li>
            ${item.text}
            <button onclick="removeItem('${section}',${i})">❌</button>
          </li>
        `).join('')}
      </ul>
    </div>
  `;
}

function goBack() {
  document.getElementById('content').innerHTML = '';
  document.getElementById('mainMenu').style.display = 'grid';
}

function addItem(section) {
  const text = document.getElementById('newItem').value;
  if (!text) return;

  if (section === "objetivos") {
    data.users[user.name].objetivos.push({ text, done:false });
  } else {
    data[section].push({ text });
  }

  saveData();
  showSection(section);
}

function removeItem(section,index){
  data[section].splice(index,1);
  saveData();
  showSection(section);
}

function toggleObjetivo(userName,index){
  let obj = data.users[userName].objetivos[index];
  obj.done = !obj.done;
  saveData();
  showSection("objetivos");
}

document.addEventListener("DOMContentLoaded", () => {
  const savedUser = localStorage.getItem("user");

  if (savedUser) {
    user = JSON.parse(savedUser);
    startApp();
  }
});
</script>

</body>
</html>

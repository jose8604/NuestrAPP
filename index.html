<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fdf6e3;
  text-align:center;
  overflow-x:hidden;
}

header{
  background:#ffe066;
  padding:15px;
  font-weight:bold;
  position:relative;
  font-size:18px;
}

.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:10px;
  background:white;
  border-radius:16px;
  padding:18px;
  width:220px;
  max-width:90vw;
  box-shadow:0 6px 16px rgba(0,0,0,.15);
  z-index:99;
}

.profile-box{text-align:center;margin-bottom:15px;}

.profile-photo{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ffe066;
}

.change-photo-btn{
  margin-top:10px;
  font-size:13px;
  width:100%;
}

.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

.menu button{
  background:#fff3bf;
  border:none;
  border-radius:22px;
  aspect-ratio:1/1;
  width:100%;
  font-size:16px;
  font-weight:600;
}

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
  position:relative;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin:8px 0;
}

button{
  background:#ffe066;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
}

.back{
  position:absolute;
  left:15px;
  top:15px;
}

.users-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:15px;
}

.user-card{
  background:#fffdf4;
  border-radius:16px;
  padding:12px;
  text-align:left;
}

.user-card ul{
  padding:0;
  margin:0;
}

li{
  list-style:none;
  background:#fff9db;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
  text-align:left;
}

.small-photo{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

.post-img{
  width:100%;
  max-width:220px;
  border-radius:12px;
  margin-top:8px;
}

.progress{
  width:72px;
  height:72px;
  border-radius:50%;
  background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
}

.progress img{
  width:56px;
  height:56px;
  border-radius:50%;
  object-fit:cover;
}

.user-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.done{
  text-decoration:line-through;
  opacity:.6;
}

.obj-actions{float:right;}

.rest-top{
  display:flex;
  justify-content:flex-end;
  margin-bottom:15px;
}

.plus-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  font-size:28px;
  line-height:1;
}

.rest-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.rest-col{
  background:#fffdf4;
  border-radius:16px;
  padding:12px;
}

.rest-item{
  background:#fff9db;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  text-align:left;
}

.rest-head{
  display:flex;
  align-items:center;
  gap:8px;
}

.rest-actions{
  margin-left:auto;
  display:flex;
  gap:6px;
}

.link-btn{
  background:none;
  border:none;
  padding:0;
  font-weight:bold;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal-box{
  background:white;
  width:100%;
  max-width:420px;
  border-radius:20px;
  padding:20px;
}

.star{
  font-size:28px;
  cursor:pointer;
  opacity:.4;
}

.star.active{
  opacity:1;
}

@media(max-width:700px){
  .menu{grid-template-columns:repeat(2,1fr);}
  .users-grid{grid-template-columns:1fr 1fr;}
  .rest-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">📷 Cambiar foto</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="auth">
<div style="font-size:22px;margin-top:25px;font-weight:bold;">Iniciar sesión</div>

<input id="nameInput" placeholder="Usuario">
<input id="passInput" type="password" placeholder="Contraseña">
<input id="photoInput" type="file" accept="image/*">

<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">

<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Planes</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<!-- MODAL NUEVO RESTAURANTE -->
<div id="addModal" class="modal">
<div class="modal-box">
<h3>Añadir restaurante</h3>
<input id="restName" placeholder="Nombre">
<input id="restAddress" placeholder="Dirección">
<input id="restPhotos" type="file" multiple accept="image/*">
<button onclick="saveRestaurant()">Añadir</button>
<button onclick="closeModal('addModal')">Cerrar</button>
</div>
</div>

<!-- MODAL VALORAR -->
<div id="rateModal" class="modal">
<div class="modal-box">
<h3>Valorar restaurante</h3>

<div id="starsBox">
<span class="star" onclick="setStars(1)">⭐</span>
<span class="star" onclick="setStars(2)">⭐</span>
<span class="star" onclick="setStars(3)">⭐</span>
<span class="star" onclick="setStars(4)">⭐</span>
<span class="star" onclick="setStars(5)">⭐</span>
</div>

<input id="ratePhotos" type="file" multiple accept="image/*">

<button onclick="confirmRate()">Guardar</button>
<button onclick="closeModal('rateModal')">Cerrar</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user=null;
let rateIndex=null;
let starsValue=0;

let data={
  users:{},
  planes:[],
  restaurantes:[],
  sitios:[]
};

function toggleMenu(){
dropdown.style.display=
dropdown.style.display==="block"?"none":"block";
if(dropdown.style.display==="block")updateMenuProfile();
}

function closeMenu(){dropdown.style.display="none";}
function logout(){localStorage.removeItem("user");location.reload();}

function updateMenuProfile(){
if(!user||!data.users[user.name])return;
menuUser.innerText=user.name;
menuPhoto.src=data.users[user.name].photo||"";
}

function compressImage(file,size=320,quality=0.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h&&w>size){h*=size/w;w=size;}
if(h>=w&&h>size){w*=size/h;h=size;}
canvas.width=w;canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function loadData(){
db.collection("app").doc("data").onSnapshot(doc=>{
if(doc.exists){
data=doc.data();
updateMenuProfile();
}
});
}

async function saveData(){
await db.collection("app").doc("data").set(data);
}

async function register(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();
const file=photoInput.files[0];

if(!name||!pass)return;

let photo=null;
if(file)photo=await compressImage(file);

data.users[name]={name,password:pass,photo,objetivos:[]};

await saveData();

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

async function login(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();

const doc=await db.collection("app").doc("data").get();
if(doc.exists)data=doc.data();

const found=data.users[name];
if(!found)return alert("Usuario no existe");
if(found.password!==pass)return alert("Contraseña incorrecta");

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

function startApp(){
loadData();
auth.style.display="none";
app.style.display="block";
updateMenuProfile();
}

changePhotoInput.addEventListener("change",async function(){
const file=this.files[0];
if(!file||!user)return;

data.users[user.name].photo=await compressImage(file);
await saveData();
updateMenuProfile();
});

function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){
content.innerHTML=`<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<div class="users-grid">
${Object.values(data.users).map(u=>{
const total=u.objetivos.length;
const done=u.objetivos.filter(x=>x.done).length;
const percent=total?(done/total)*100:0;

return `
<div class="user-card">
<div class="user-header">
<div class="progress" style="--progress:${percent}%">
<img src="${u.photo||''}">
</div>
<div><b>${u.name}</b><br>${Math.round(percent)}%</div>
</div>

<ul>
${u.objetivos.map((o,i)=>`
<li class="${o.done?'done':''}">
${o.text}
<span class="obj-actions">
<button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
<button onclick="removeObjetivo('${u.name}',${i})">❌</button>
</span>
</li>`).join("")}
</ul>
</div>`;
}).join("")}
</div>

<input id="newItem" placeholder="Nuevo objetivo">
<button onclick="addItem('objetivos')">Añadir</button>
</div>`;
return;
}

if(section==="restaurantes"){
renderRestaurants();
return;
}

content.innerHTML=`<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<p>Sección en desarrollo</p>
</div>`;
}

function renderRestaurants(){

const pendientes=data.restaurantes.filter(x=>!x.done);
const hechos=data.restaurantes.filter(x=>x.done);

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>

<div class="card">
<div class="rest-top">
<button class="plus-btn" onclick="openModal('addModal')">+</button>
</div>

<div class="rest-grid">

<div class="rest-col">
<h3>Por probar</h3>

${pendientes.map((r,i)=>`
<div class="rest-item">

<div class="rest-head">
<img class="small-photo" src="${data.users[r.user]?.photo||''}">

<button class="link-btn" onclick="toggleDetails(${i})">${r.name}</button>

<div class="rest-actions">
<button onclick="openRate(${i})">✔</button>
<button onclick="removeRestaurant(${i})">❌</button>
</div>
</div>

<div id="det${i}" style="display:none;margin-top:8px;">
${r.address}<br>
${(r.photos||[]).map(p=>`<img class="post-img" src="${p}">`).join("")}
</div>

</div>
`).join("")}

</div>

<div class="rest-col">
<h3>Probados</h3>

${hechos.map(r=>`
<div class="rest-item">
<b>${r.name}</b><br>
${"⭐".repeat(r.rating)} (${r.rating}/5)
${(r.photosRated||[]).map(p=>`<img class="post-img" src="${p}">`).join("")}
</div>
`).join("")}

</div>

</div>
</div>
`;
}

function toggleDetails(i){
const box=document.getElementById("det"+i);
box.style.display=box.style.display==="none"?"block":"none";
}

function openModal(id){
document.getElementById(id).style.display="flex";
}

function closeModal(id){
document.getElementById(id).style.display="none";
}

async function saveRestaurant(){

const files=[...restPhotos.files];
let photos=[];

for(let f of files){
photos.push(await compressImage(f,600,0.88));
}

data.restaurantes.push({
name:restName.value.trim(),
address:restAddress.value.trim(),
photos,
user:user.name,
done:false
});

await saveData();
closeModal("addModal");
renderRestaurants();
}

function openRate(i){
rateIndex=i;
starsValue=0;
setStars(0);
openModal("rateModal");
}

function setStars(n){
starsValue=n;
document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
}

async function confirmRate(){

const files=[...ratePhotos.files];
let imgs=[];

for(let f of files){
imgs.push(await compressImage(f,600,0.88));
}

data.restaurantes[rateIndex].done=true;
data.restaurantes[rateIndex].rating=starsValue;
data.restaurantes[rateIndex].photosRated=imgs;

await saveData();
closeModal("rateModal");
renderRestaurants();
}

function removeRestaurant(i){
data.restaurantes.splice(i,1);
saveData();
renderRestaurants();
}

async function addItem(section){
const text=newItem.value.trim();
if(!text)return;

data.users[user.name].objetivos.push({
text,
done:false
});

await saveData();
showSection("objetivos");
}

function toggleObjetivo(name,i){
data.users[name].objetivos[i].done=!data.users[name].objetivos[i].done;
saveData();
showSection("objetivos");
}

function removeObjetivo(name,i){
data.users[name].objetivos.splice(i,1);
saveData();
showSection("objetivos");
}

function goBack(){
content.innerHTML="";
mainMenu.style.display="grid";
}

document.addEventListener("DOMContentLoaded",()=>{
loadData();

const saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
setTimeout(()=>startApp(),500);
}
});
</script>

</body>
</html>

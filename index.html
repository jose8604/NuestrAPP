.rest-wrap{

gap:15px;

.rest-col{

padding:12px;
border-radius:16px;
text-align:left;
}
.rest-top{

justify-content:space-between;
align-items:center;

.plus-btn{

height:42px;

.modal{

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"nuestrapp-3329a.firebaseapp.com",
projectId:"nuestrapp-3329a",
storageBucket:"nuestrapp-3329a.firebasestorage.app",
messagingSenderId:"11964303180",
appId:"1:11964303180:web:28412e809348d20d6af1e9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=null;
let selectedStars=0;
let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();

let data={
users:{},
calendario:[],
restaurantes:[],
viajes:[]

function toggleMenu(){
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
if(user && data.users[user.name]){
menuUser.innerText=user.name;
menuPhoto.src=data.users[user.name].photo||"";
}
}
function closeMenu(){dropdown.style.display="none";}
function logout(){localStorage.removeItem("user");location.reload();}

function compressImage(file,size=320,quality=.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}
canvas.width=w;
canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function loadData(){
db.collection("app").doc("data").onSnapshot(doc=>{
if(doc.exists){
data=doc.data();

if(!data.restaurantes)data.restaurantes=[];
if(!data.calendario)data.calendario=[];
if(!data.viajes)data.viajes=[];
if(!data.users)data.users={};

}
});
}

async function saveData(){
await db.collection("app").doc("data").set(data);
}

async function register(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();
const file=photoInput.files[0];
if(!name||!pass)return;

let photo="";
if(file)photo=await compressImage(file);

data.users[name]={name,password:pass,photo,objetivos:[]};
await saveData();

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

async function login(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();

const doc=await db.collection("app").doc("data").get();
if(doc.exists)data=doc.data();

if(!data.users[name]) return alert("No existe");
if(data.users[name].password!==pass) return alert("Contraseña incorrecta");

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

function startApp(){
auth.style.display="none";
app.style.display="block";
loadData();
}

function goBack(){
content.innerHTML="";
mainMenu.style.display="grid";
}

function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){renderObjetivos();return;}
if(section==="restaurantes"){renderRestaurantes();return;}
if(section==="viajes"){renderViajes();return;}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<input id="newItem" placeholder="Escribe algo">
<button onclick="addItem('${section}')">Añadir</button>
<ul>
${data[section].map((item,i)=>`
<li><b>${item.user}</b><br>${item.text}
<br><button onclick="removeItem('${section}',${i})">❌</button></li>
`).join("")}
</ul>
</div>`;
}

/* OBJETIVOS */
function renderObjetivos(){
content.innerHTML=`<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<div class="users-grid">
${Object.values(data.users).map(u=>{
const total=u.objetivos.length;
const done=u.objetivos.filter(x=>x.done).length;
const percent=total?(done/total)*100:0;
return `
<div class="user-card">
<div class="user-header">
<div class="progress" style="--progress:${percent}%">
<img src="${u.photo||''}">
</div>
<div><b>${u.name}</b><br><small>${Math.round(percent)}% completado</small></div>
</div>
<ul>
${u.objetivos.map((o,i)=>`
<li class="${o.done?'done':''}">
${o.text}
<span class="obj-actions">
<button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
<button onclick="removeObjetivo('${u.name}',${i})">❌</button>
</span>
</li>`).join("")}
</ul>
</div>`;
}).join("")}
</div>
<input id="newItem" placeholder="Nuevo objetivo">
<button onclick="addItem('objetivos')">Añadir</button>
</div>`;
}

/* PLANES CALENDARIO */
function renderPlanes(){
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const primerDia=new Date(currentYear,currentMonth,1).getDay();
const offset=(primerDia+6)%7;
const diasMes=new Date(currentYear,currentMonth+1,0).getDate();
const hoy=new Date();

let grid="";
for(let i=0;i<offset;i++) grid+=`<div class="day empty"></div>`;

for(let d=1;d<=diasMes;d++){
const fecha=formatDate(currentYear,currentMonth,d);
const eventos=data.planes.filter(x=>x.date===fecha);
const isToday=hoy.getDate()===d && hoy.getMonth()===currentMonth && hoy.getFullYear()===currentYear;

grid+=`
<div class="day ${isToday?'today':''}" onclick="openDay('${fecha}')">
${d}
<div style="margin-top:4px;">
${eventos.map(ev=>`
<div style="
background:${ev.color||'#ffd43b'};
border-radius:8px;
font-size:10px;
padding:2px 4px;
margin-top:3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
line-height:1.2;
">
${ev.title}
</div>
`).join("")}
</div></div>`;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<div class="cal-head">
<button class="cal-nav" onclick="changeMonth(-1)">◀</button>
<h3>${meses[currentMonth]} ${currentYear}</h3>
<button class="cal-nav" onclick="changeMonth(1)">▶</button>
</div>

<div class="weekdays">
<div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div class="calendar-grid">
${grid}
</div>
</div>`;
}

function changeMonth(v){
currentMonth+=v;
if(currentMonth<0){currentMonth=11;currentYear--;}
if(currentMonth>11){currentMonth=0;currentYear++;}
renderPlanes();
}

function formatDate(y,m,d){
return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}

function openDay(fecha){
const eventos=data.planes.filter(x=>x.date===fecha);

content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalDay">
<div class="modal-box">
<h3>${fecha}</h3>

<input id="evTitulo" placeholder="Título">
<input id="evHora" type="time">
<input id="evLugar" placeholder="Lugar">
<select id="evColor">
<option value="#ffd43b">Amarillo</option>
<option value="#69db7c">Verde</option>
<option value="#74c0fc">Azul</option>
<option value="#ff8787">Rojo</option>
<option value="#d0bfff">Lila</option>
</select>
<textarea id="evDesc" placeholder="Descripción"></textarea>

<button onclick="saveEvent('${fecha}')">Añadir evento</button>
<hr>

${eventos.length?eventos.map((e,i)=>`
<div class="event-item" style="background:${e.color}">
<div style="display:flex;align-items:center;gap:8px;">
<img class="small-photo" src="${data.users[e.user]?.photo||''}">
<b style="flex:1">${e.title}</b>

<button class="icon-btn"
onclick="openEditEvent('${fecha}',${i})">✏️</button>

<button class="icon-btn"
onclick="deleteEvent('${fecha}',${i})">🗑️</button>

</div>

<div>🕒 ${e.time||'-'}</div>
<div>📍 ${e.place||'-'}</div>
<div>${e.desc||''}</div>
<small>Creado por ${e.user}</small>
</div>
`).join(""):"<p>Sin eventos</p>"}

<button onclick="closeModal()">Cerrar</button>
</div>
</div>`);
}

async function saveEvent(fecha){
data.planes.push({
date:fecha,
title:evTitulo.value.trim(),
time:evHora.value,
place:evLugar.value.trim(),
color:evColor.value,
desc:evDesc.value.trim(),
user:user.name
});
await saveData();
closeModal();
renderPlanes();
}

function mediaValoraciones(arr){
if(!arr || !arr.length) return 0;
return (arr.reduce((a,b)=>a+b.stars,0)/arr.length).toFixed(1);
}

function openAddRestaurant(){
content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">
<h3>Añadir restaurante</h3>

<input id="rNombre" placeholder="Nombre">
<input id="rDireccion" placeholder="Dirección">
<textarea id="rDesc" placeholder="Descripción"></textarea>
<input id="rPlatos" placeholder="Platos recomendados">

<button onclick="saveRestaurant()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
}

async function saveRestaurant(){
let fotos=[];

if(rFotos.files.length){
for(let f of rFotos.files){
fotos.push(await compressImage(f,600,.88));
}
}

data.restaurantes.push({
nombre:rNombre.value.trim(),
direccion:rDireccion.value.trim(),
descripcion:rDesc.value.trim(),
platos:rPlatos.value.trim(),
fotos:fotos,
user:user.name,
done:false,
valoraciones:[]
});

await saveData();
closeModal();
renderRestaurantes();
}

function openAddViaje(){

<div class="modal-box">

<h3>Nuevo viaje</h3>

<input id="viajeNombre" placeholder="Destino">
<input id="viajePresupuesto" placeholder="Presupuesto aprox">
<textarea id="viajeNotas" placeholder="Notas"></textarea>

<button onclick="saveViaje()">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function saveViaje(){

data.viajes.push({
nombre:viajeNombre.value,
presupuesto:viajePresupuesto.value,
notas:viajeNotas.value,
estado:"pendiente",
fecha:"",
valoracion:"",
precioFinal:"",
user:user.name
});

await saveData();
closeModal();
renderViajes();
}



function openEditViaje(i){

let v=data.viajes[i];

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Editar viaje</h3>

<input id="editVN" value="${v.nombre}">
<input id="editVP" value="${v.presupuesto}">
<textarea id="editVT">${v.notas||''}</textarea>

<button onclick="saveEditViaje(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function saveEditViaje(i){

data.viajes[i].nombre=editVN.value;
data.viajes[i].presupuesto=editVP.value;
data.viajes[i].notas=editVT.value;

await saveData();
closeModal();
renderViajes();
}



function openMoveViaje(i){

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Elegir fecha</h3>

<input type="date" id="fechaViaje">

<button onclick="moveViaje(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function moveViaje(i){

let fecha=fechaViaje.value;

data.viajes[i].estado="proximo";
data.viajes[i].fecha=fecha;

data.planes.push({
date:fecha,
title:"✈️ "+data.viajes[i].nombre,
time:"",
place:data.viajes[i].nombre,
color:"#74c0fc",
desc:"Viaje programado",
user:user.name
});

await saveData();
closeModal();
renderViajes();
}



function openFinishViaje(i){

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Finalizar viaje</h3>

<input id="notaViaje" placeholder="Valoración 1-5">
<input id="precioFinalViaje" placeholder="Precio total">

<button onclick="finishViaje(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function finishViaje(i){

data.viajes[i].estado="visitado";
data.viajes[i].valoracion=notaViaje.value;
data.viajes[i].precioFinal=precioFinalViaje.value;

await saveData();
closeModal();
renderViajes();
}

/* GENERALES */
async function addItem(section){
const text=newItem.value.trim();
if(!text)return;

if(section==="objetivos"){
data.users[user.name].objetivos.push({text,done:false});
await saveData();
renderObjetivos();
return;
}

data[section].push({text,user:user.name});
await saveData();
showSection(section);
}

function toggleObjetivo(name,i){
data.users[name].objetivos[i].done=!data.users[name].objetivos[i].done;
saveData();
renderObjetivos();
}

function removeObjetivo(name,i){
data.users[name].objetivos.splice(i,1);
saveData();
renderObjetivos();
}

function removeItem(section,i){
data[section].splice(i,1);
saveData();

if(section==="viajes") renderViajes();
else showSection(section);
}

function closeModal(){
document.querySelectorAll(".modal").forEach(x=>x.remove());
}
changePhotoInput.addEventListener("change", async e=>{
const file=e.target.files[0];
if(!file || !user) return;

const foto=await compressImage(file,320,.85);

data.users[user.name].photo=foto;
await saveData();

menuPhoto.src=foto;

if(content.innerHTML.includes("Restaurantes")) renderRestaurantes();
else if(content.innerHTML.includes("completado")) renderObjetivos();
});

function openRestaurantView(i){
const r=data.restaurantes[i];

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>${r.nombre}</h3>
<p>📍 ${r.direccion||""}</p>
<p>${r.descripcion||""}</p>
<p>🍴 ${r.platos||""}</p>

${r.fotos?.map(f=>`
<img src="${f}" style="width:100%;border-radius:12px;margin:8px 0;">
`).join("")||""}

<button onclick="closeModal()">Cerrar</button>

</div>
</div>
`);
}

function openVoteRestaurant(i){
selectedStars=0;

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Valorar restaurante</h3>

<div>
<span class="star" onclick="setStars(1)">⭐</span>
<span class="star" onclick="setStars(2)">⭐</span>
<span class="star" onclick="setStars(3)">⭐</span>
<span class="star" onclick="setStars(4)">⭐</span>
<span class="star" onclick="setStars(5)">⭐</span>
</div>

<input id="precioRest" placeholder="Precio €€">

<button onclick="saveVoteRestaurant(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

function setStars(n){
selectedStars=n;

document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
}

async function saveVoteRestaurant(i){

if(!selectedStars) return;

if(!data.restaurantes[i].valoraciones)
data.restaurantes[i].valoraciones=[];

/* borrar voto anterior del usuario */
data.restaurantes[i].valoraciones =
data.restaurantes[i].valoraciones.filter(v=>v.user!==user.name);

/* guardar nuevo voto */
data.restaurantes[i].valoraciones.push({
user:user.name,
stars:selectedStars
});

/* precio */
data.restaurantes[i].precio=precioRest.value;

/* PASAR A VALORADOS */
data.restaurantes[i].done=true;

await saveData();
closeModal();
renderRestaurantes();
}

function openEditRestaurant(i){
const r=data.restaurantes[i];

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Editar</h3>

<input id="eNombre" value="${r.nombre}">
<input id="eDireccion" value="${r.direccion||''}">
<textarea id="eDesc">${r.descripcion||''}</textarea>
<input id="ePlatos" value="${r.platos||''}">

<button onclick="saveEditRestaurant(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function saveEditRestaurant(i){

let r=data.restaurantes[i];

r.nombre=eNombre.value;
r.direccion=eDireccion.value;
r.descripcion=eDesc.value;
r.platos=ePlatos.value;

await saveData();
closeModal();
renderRestaurantes();
}

function openEditEvent(fecha,i){

const eventos=data.planes.filter(x=>x.date===fecha);
const ev=eventos[i];

content.insertAdjacentHTML("beforeend",`
<div class="modal">
<div class="modal-box">

<h3>Editar evento</h3>

<input id="editTitulo" value="${ev.title}">
<input id="editHora" type="time" value="${ev.time}">
<input id="editLugar" value="${ev.place}">
<textarea id="editDesc">${ev.desc}</textarea>

<button onclick="saveEditEvent('${fecha}',${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>

</div>
</div>
`);
}

async function saveEditEvent(fecha,i){

let index=data.planes.findIndex((x,n)=>
x.date===fecha &&
data.planes.filter(y=>y.date===fecha).indexOf(x)===i
);

if(index===-1) return;

data.planes[index].title=editTitulo.value;
data.planes[index].time=editHora.value;
data.planes[index].place=editLugar.value;
data.planes[index].desc=editDesc.value;

await saveData();
closeModal();
closeModal();
openDay(fecha);
}

async function deleteEvent(fecha,i){

let lista=data.planes.filter(x=>x.date===fecha);
let ev=lista[i];

let index=data.planes.indexOf(ev);

if(index===-1) return;

data.planes.splice(index,1);

await saveData();

closeModal();
closeModal();
openDay(fecha);
renderPlanes();
}

document.addEventListener("DOMContentLoaded",()=>{
loadData();
const saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
startApp();
}
});
</script>

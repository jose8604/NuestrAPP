<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #fdf6e3;
  text-align: center;
}

header {
  background: #ffe066;
  padding: 15px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.menu button {
  background: #fff3bf;
  border-radius: 20px;
  padding: 20px;
  font-size: 16px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

input {
  padding: 10px;
  width: 80%;
  margin: 10px;
  border-radius: 10px;
}

button {
  background: #ffe066;
  border-radius: 10px;
  padding: 10px;
}

li {
  background: #fff9db;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

/* 🔵 CIRCULO PROGRESO */
.progress {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: conic-gradient(#ffd43b var(--progress), #eee 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.progress img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
}

.back {
  position: absolute;
  left: 10px;
  top: 10px;
}

.user-row {
  margin-bottom: 25px;
}
</style>
</head>

<body>

<header>💛 Nuestra App 💛</header>

<div id="auth" class="container">
  <h3>Registro</h3>
  <input id="name" placeholder="Tu nombre"><br>
  <input type="file" id="photo"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;" class="container">

  <div id="mainMenu" class="menu">
    <button onclick="showSection('objetivos')">🎯 Objetivos</button>
    <button onclick="showSection('planes')">📅 Planes</button>
    <button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
    <button onclick="showSection('sitios')">📍 Sitios</button>
  </div>

  <div id="content"></div>
</div>

<!-- 🔥 FIREBASE (NO TOCADO) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
let user = null;

let data = {
  users: {},
  planes: [],
  restaurantes: [],
  sitios: []
};

function loadData() {
  db.collection("app").doc("data")
    .onSnapshot((doc) => {
      if (doc.exists) data = doc.data();
    });
}

async function saveData() {
  await db.collection("app").doc("data").set(data);
}

async function login() {
  const name = document.getElementById('name').value;
  const file = document.getElementById('photo').files[0];

  if (!name) return alert("Pon nombre");

  let photo = null;

  if (file) {
    photo = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  user = { name, photo };
  localStorage.setItem("user", JSON.stringify(user));

  await db.collection("app").doc("data").set({
    users: {
      [name]: {
        name,
        photo,
        objetivos: []
      }
    }
  }, { merge: true });

  startApp();
}

function startApp() {
  loadData();
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showSection(section) {
  document.getElementById('mainMenu').style.display = 'none';
  const c = document.getElementById('content');

  if (section === "objetivos") {
    c.innerHTML = `
      <button class="back" onclick="goBack()">⬅</button>
      <div class="card">

        ${Object.values(data.users).map(u => {
          const total = u.objetivos.length;
          const done = u.objetivos.filter(o=>o.done).length;
          const percent = total ? (done/total)*100 : 0;

          return `
          <div class="user-row">

            <div class="progress" style="--progress:${percent}%">
              <img src="${u.photo || ''}">
            </div>

            <ul>
              ${u.objetivos.map((o,i)=>`
                <li>
                  ${o.text}
                  <button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
                </li>
              `).join('')}
            </ul>

          </div>
          `;
        }).join('')}

        <input id="newItem" placeholder="Nuevo objetivo">
        <button onclick="addItem('objetivos')">Añadir</button>

      </div>
    `;
    return;
  }

  c.innerHTML = `
    <button class="back" onclick="goBack()">⬅</button>
    <div class="card">

      <input id="newItem">
      <button onclick="addItem('${section}')">Añadir</button>

      <ul>
        ${data[section].map((item,i)=>`
          <li>
            <img src="${data.users[item.user]?.photo}" width="30" style="border-radius:50%">
            ${item.text}
            <button onclick="removeItem('${section}',${i})">❌</button>
          </li>
        `).join('')}
      </ul>

    </div>
  `;
}

function goBack(){
  content.innerHTML="";
  mainMenu.style.display="grid";
}

function addItem(section){
  const text = document.getElementById('newItem').value;
  if(!text) return;

  if(section==="objetivos"){
    data.users[user.name].objetivos.push({text,done:false});
  } else {
    data[section].push({text,user:user.name});
  }

  saveData();
  showSection(section);
}

function removeItem(section,i){
  data[section].splice(i,1);
  saveData();
  showSection(section);
}

function toggleObjetivo(userName,i){
  let obj = data.users[userName].objetivos[i];
  obj.done = !obj.done;
  saveData();
  showSection("objetivos");
}

document.addEventListener("DOMContentLoaded",()=>{
  const saved = localStorage.getItem("user");
  if(saved){
    user = JSON.parse(saved);
    startApp();
  }
});
</script>

</body>
</html>

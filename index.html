<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<!-- ICONO APP -->
<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fdf6e3;
  text-align:center;
  overflow-x:hidden;
}

header{
  background:#ffe066;
  padding:15px;
  font-weight:bold;
  position:relative;
  font-size:18px;
}

.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:10px;
  background:white;
  border-radius:16px;
  padding:18px;
  width:220px;
  max-width:90vw;
  box-shadow:0 6px 16px rgba(0,0,0,.15);
  z-index:99;
}

.profile-box{
  text-align:center;
  margin-bottom:15px;
}

.profile-photo{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ffe066;
}

.change-photo-btn{
  margin-top:10px;
  font-size:13px;
  width:100%;
}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.menu button{
  background:#fff3bf;
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:16px;
  width:100%;
}

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
  position:relative;
  max-width:100%;
  overflow:hidden;
}

input, textarea, select{
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  width:100%;
  box-sizing:border-box;
  font-size:15px;
}

button{
  background:#ffe066;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
}

li{
  background:#fff9db;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  list-style:none;
  text-align:left;
}

.back{
  position:absolute;
  left:10px;
  top:10px;
}

.user-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.progress{
  width:72px;
  height:72px;
  border-radius:50%;
  background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.progress img{
  width:56px;
  height:56px;
  border-radius:50%;
  object-fit:cover;
}

.done{
  text-decoration:line-through;
  opacity:.6;
}

.small-photo{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
  vertical-align:middle;
  margin-right:8px;
}

.post-img{
  width:100%;
  max-width:220px;
  border-radius:12px;
  margin-top:10px;
  display:block;
}

.auth-title{
  font-size:22px;
  margin-top:25px;
  font-weight:bold;
}

.obj-actions{
  float:right;
}

.obj-actions button{
  margin-left:6px;
}

/* OBJETIVOS GRID */
.users-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:15px;
}

.user-card{
  background:#fffdf4;
  border-radius:16px;
  padding:12px;
  text-align:left;
  min-width:0;
}

.user-card ul{
  padding:0;
  margin:0;
}

/* NUEVO RESTAURANTES */
.rest-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.rest-col{
  background:#fffdf4;
  padding:12px;
  border-radius:16px;
  text-align:left;
}

.rest-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.plus-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  font-size:24px;
  padding:0;
}

.rest-item{
  background:#fff9db;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.rest-line{
  display:flex;
  align-items:center;
  gap:8px;
}

.rest-actions{
  margin-left:auto;
  display:flex;
  gap:6px;
}

.star{
  font-size:24px;
  cursor:pointer;
  opacity:.4;
}

.star.active{
  opacity:1;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  background:white;
  width:92%;
  max-width:420px;
  border-radius:18px;
  padding:18px;
}

.hidden-file{
  display:none;
}

/* MOVIL */
@media(max-width:700px){

  body{
    font-size:15px;
  }

  .menu{
    grid-template-columns:1fr;
    padding:15px;
  }

  .users-grid{
    grid-template-columns:1fr;
  }

  .rest-wrap{
    grid-template-columns:1fr;
  }

  .card{
    margin:10px;
    padding:16px;
  }

  .dropdown{
    left:5%;
    width:90%;
  }

  .back{
    position:relative;
    display:block;
    margin-bottom:12px;
    left:auto;
    top:auto;
  }

  .obj-actions{
    float:none;
    display:block;
    margin-top:8px;
  }

  .obj-actions button{
    margin-left:0;
    margin-right:6px;
  }

  .post-img{
    max-width:100%;
  }
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">

<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">
📷 Cambiar foto
</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>

</div>
</header>

<div id="auth">
<div class="auth-title">Iniciar sesión</div>

<input id="nameInput" placeholder="Usuario"><br>
<input id="passInput" type="password" placeholder="Contraseña"><br>
<input id="photoInput" type="file" accept="image/*"><br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">

<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Planes</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = null;
let selectedStars = 0;

let data = {
  users:{},
  planes:[],
  restaurantes:[],
  sitios:[]
};

function toggleMenu(){
  dropdown.style.display =
  dropdown.style.display==="block" ? "none" : "block";

  if(dropdown.style.display==="block"){
    updateMenuProfile();
  }
}

function closeMenu(){
  dropdown.style.display="none";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function updateMenuProfile(){
  if(!user || !data.users[user.name]) return;
  menuUser.innerText = user.name;
  menuPhoto.src = data.users[user.name].photo || "";
}

function compressImage(file,size=320,quality=0.85){
  return new Promise(resolve=>{
    const reader = new FileReader();

    reader.onload = e=>{
      const img = new Image();

      img.onload = ()=>{
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if(w>h){
          if(w>size){
            h *= size/w;
            w = size;
          }
        }else{
          if(h>size){
            w *= size/h;
            h = size;
          }
        }

        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);

        resolve(canvas.toDataURL("image/jpeg",quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function loadData(){
  db.collection("app").doc("data")
  .onSnapshot(doc=>{
    if(doc.exists){
      data = doc.data();

      if(!data.restaurantes) data.restaurantes=[];
      updateMenuProfile();
    }
  });
}

async function saveData(){
  await db.collection("app").doc("data").set(data);
}

async function register(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();
  const file = photoInput.files[0];

  if(!name || !pass) return alert("Completa usuario y contraseña");

  if(data.users[name]) return alert("Ese usuario ya existe");

  let photo = null;
  if(file) photo = await compressImage(file);

  data.users[name] = {
    name:name,
    password:pass,
    photo:photo,
    objetivos:[]
  };

  await saveData();

  user = {name:name};
  localStorage.setItem("user",JSON.stringify(user));
  startApp();
}

async function login(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();

  if(!name || !pass) return alert("Pon usuario y contraseña");

  const doc = await db.collection("app").doc("data").get();
  if(doc.exists) data = doc.data();

  const found = data.users[name];

  if(!found) return alert("Usuario no existe");
  if(found.password !== pass) return alert("Contraseña incorrecta");

  user = {name:name};
  localStorage.setItem("user",JSON.stringify(user));

  startApp();
}

function startApp(){
  loadData();
  auth.style.display="none";
  app.style.display="block";
  updateMenuProfile();
}

changePhotoInput.addEventListener("change", async function(){

  const file = this.files[0];
  if(!file || !user) return;

  const img = await compressImage(file,320,0.85);

  data.users[user.name].photo = img;

  await saveData();
  updateMenuProfile();

  const actual = document.querySelector("[data-section]");
  if(actual) showSection(actual.dataset.section);
});

function showSection(section){

closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){

content.innerHTML = `
<button class="back" onclick="goBack()">⬅</button>
<div class="card" data-section="objetivos">

<div class="users-grid">

${Object.values(data.users).map(u=>{

const total = u.objetivos.length;
const done = u.objetivos.filter(x=>x.done).length;
const percent = total ? (done/total)*100 : 0;

return `
<div class="user-card">

<div class="user-header">
<div class="progress" style="--progress:${percent}%">
<img src="${u.photo || ''}">
</div>

<div>
<b>${u.name}</b><br>
<small>${Math.round(percent)}% completado</small>
</div>
</div>

<ul>
${u.objetivos.map((o,i)=>`
<li class="${o.done?'done':''}">
${o.text}

<span class="obj-actions">
<button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
<button onclick="removeObjetivo('${u.name}',${i})">❌</button>
</span>

</li>
`).join("")}
</ul>

</div>
`;

}).join("")}

</div>

<input id="newItem" placeholder="Nuevo objetivo">
<button onclick="addItem('objetivos')">Añadir</button>

</div>
`;
return;
}

/* NUEVO RESTAURANTES */
if(section==="restaurantes"){

const pendientes = data.restaurantes.filter(x=>!x.done);
const hechos = data.restaurantes.filter(x=>x.done);

content.innerHTML = `
<button class="back" onclick="goBack()">⬅</button>

<div class="card" data-section="restaurantes">

<div class="rest-top">
<h3 style="margin:0">🍽️ Restaurantes</h3>
<button class="plus-btn" onclick="openAddRestaurant()">+</button>
</div>

<div class="rest-wrap">

<div class="rest-col">
<b>Pendientes</b>
<div style="margin-top:10px">

${pendientes.map((item,i)=>`
<div class="rest-item">

<div class="rest-line">
<img class="small-photo" src="${data.users[item.user]?.photo || ''}">

<span onclick="toggleDetails(${data.restaurantes.indexOf(item)})" style="cursor:pointer;font-weight:bold;">
${item.nombre}
</span>

<div class="rest-actions">
<button onclick="removeItem('restaurantes',${data.restaurantes.indexOf(item)})">❌</button>
<button onclick="openRateRestaurant(${data.restaurantes.indexOf(item)})">✔</button>
</div>
</div>

<div id="detail${data.restaurantes.indexOf(item)}" style="display:none;margin-top:10px;">
<div>${item.direccion}</div>
${(item.fotos||[]).map(f=>`<img class="post-img" src="${f}">`).join("")}
</div>

</div>
`).join("")}

</div>
</div>

<div class="rest-col">
<b>Valorados</b>
<div style="margin-top:10px">

${hechos.map(item=>`
<div class="rest-item">
<b>${item.nombre}</b><br>
⭐ ${item.stars}/5
${(item.reviewFotos||[]).map(f=>`<img class="post-img" src="${f}">`).join("")}
</div>
`).join("")}

</div>
</div>

</div>

</div>
`;
return;
}

/* resto igual */
content.innerHTML = `
<button class="back" onclick="goBack()">⬅</button>

<div class="card" data-section="${section}">

<input id="newItem" placeholder="Escribe algo">
<button onclick="addItem('${section}')">Añadir</button>

<ul>

${data[section].map((item,i)=>`
<li>
<b>${item.user}</b><br>
${item.text}
<br><button onclick="removeItem('${section}',${i})">❌</button>
</li>
`).join("")}

</ul>

</div>
`;
}

function toggleDetails(i){
const el = document.getElementById("detail"+i);
el.style.display = el.style.display==="block" ? "none" : "block";
}

function openAddRestaurant(){
content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalAdd">
<div class="modal-box">
<h3>Añadir restaurante</h3>
<input id="rNombre" placeholder="Nombre">
<input id="rDireccion" placeholder="Dirección">
<input type="file" id="rFotos" multiple accept="image/*">
<button onclick="saveRestaurant()">Añadir</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
}

async function saveRestaurant(){
const nombre = rNombre.value.trim();
const direccion = rDireccion.value.trim();
const files = rFotos.files;

if(!nombre) return;

let fotos = [];

for(let f of files){
 fotos.push(await compressImage(f,600,0.88));
}

data.restaurantes.push({
 nombre,
 direccion,
 fotos,
 user:user.name,
 done:false
});

await saveData();
showSection("restaurantes");
}

function openRateRestaurant(i){
content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalRate">
<div class="modal-box">
<h3>Valorar</h3>

<div id="starsBox">
${[1,2,3,4,5].map(n=>`<span class="star" onclick="setStars(${n})">⭐</span>`).join("")}
</div>

<input type="file" id="rateFotos" multiple accept="image/*">

<button onclick="saveRate(${i})">Guardar</button>
<button onclick="closeModal()">Cancelar</button>
</div>
</div>
`);
selectedStars = 0;
}

function setStars(n){
selectedStars = n;
document.querySelectorAll(".star").forEach((s,i)=>{
s.classList.toggle("active", i < n);
});
}

async function saveRate(i){
let fotos = [];
const files = rateFotos.files;

for(let f of files){
 fotos.push(await compressImage(f,600,0.88));
}

data.restaurantes[i].done = true;
data.restaurantes[i].stars = selectedStars;
data.restaurantes[i].reviewFotos = fotos;

await saveData();
showSection("restaurantes");
}

function closeModal(){
document.getElementById("modalAdd")?.remove();
document.getElementById("modalRate")?.remove();
}

async function addItem(section){

const text = newItem.value.trim();

if(!text) return;

if(section==="objetivos"){

data.users[user.name].objetivos.push({
  text:text,
  done:false
});

await saveData();
showSection(section);
return;
}

data[section].push({
  text:text,
  user:user.name
});

await saveData();
showSection(section);
}

function toggleObjetivo(name,i){
data.users[name].objetivos[i].done =
!data.users[name].objetivos[i].done;

saveData();
showSection("objetivos");
}

function removeObjetivo(name,i){
data.users[name].objetivos.splice(i,1);
saveData();
showSection("objetivos");
}

function removeItem(section,i){
data[section].splice(i,1);
saveData();
showSection(section);
}

function goBack(){
closeMenu();
content.innerHTML="";
mainMenu.style.display="grid";
}

document.addEventListener("DOMContentLoaded",()=>{

loadData();

const saved = localStorage.getItem("user");

if(saved){
  user = JSON.parse(saved);

  setTimeout(()=>{
    startApp();
  },500);
}

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fdf6e3;
text-align:center;
overflow-x:hidden;
}
header{
background:#ffe066;
padding:15px;
font-weight:bold;
position:relative;
font-size:18px;
}
.menu-btn{
position:absolute;
left:10px;
top:10px;
font-size:22px;
cursor:pointer;
}
.dropdown{
display:none;
position:absolute;
top:55px;
left:10px;
background:white;
border-radius:16px;
padding:18px;
width:220px;
max-width:90vw;
box-shadow:0 6px 16px rgba(0,0,0,.15);
z-index:99;
}
.profile-box{text-align:center;margin-bottom:15px;}
.profile-photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffe066;
}
.change-photo-btn{
margin-top:10px;
font-size:13px;
width:100%;
}
.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}
.menu button{
background:#fff3bf;
border:none;
border-radius:20px;
padding:22px;
font-size:16px;
width:100%;
}
.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
position:relative;
max-width:100%;
overflow:hidden;
}
input,textarea,select{
margin:8px 0;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
width:100%;
font-size:15px;
}
button{
background:#ffe066;
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
}
li{
background:#fff9db;
margin:10px 0;
padding:12px;
border-radius:12px;
list-style:none;
text-align:left;
}
.back{
position:absolute;
left:10px;
top:10px;
}
.small-photo{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
margin-right:8px;
}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
.modal-box{
background:white;
width:92%;
max-width:420px;
border-radius:18px;
padding:18px;
max-height:90vh;
overflow:auto;
}
.icon-btn{
width:38px;
height:38px;
border-radius:50%;
padding:0;
font-size:18px;
}

/* CALENDARIO */
.calendar-head{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-bottom:15px;
}
.cal-arrow{
width:42px;
height:42px;
border-radius:50%;
font-size:22px;
padding:0;
}
.cal-title{
font-weight:700;
font-size:20px;
flex:1;
text-align:center;
}
.weekdays,.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}
.weekdays div{
font-size:12px;
font-weight:700;
opacity:.7;
padding:6px 0;
}
.day-box{
background:#fff9db;
border-radius:14px;
min-height:74px;
padding:6px;
cursor:pointer;
text-align:left;
}
.day-num{
font-weight:700;
font-size:14px;
}
.day-events{
margin-top:4px;
display:flex;
flex-direction:column;
gap:3px;
}
.mini-event{
height:7px;
border-radius:20px;
}
.empty-day{visibility:hidden;}
.event-card{
background:#fff9db;
padding:10px;
border-radius:14px;
margin-top:10px;
text-align:left;
}
.widget-box{
margin-top:16px;
background:#fff9db;
padding:12px;
border-radius:16px;
text-align:left;
}
@media(max-width:700px){
.menu{grid-template-columns:1fr;padding:15px;}
.card{margin:10px;padding:16px;}
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">
<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>
<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn">📷 Cambiar foto</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>
</div>
</header>

<div id="auth">
<h2>Iniciar sesión</h2>
<input id="nameInput" placeholder="Usuario">
<input id="passInput" type="password" placeholder="Contraseña">
<input id="photoInput" type="file" accept="image/*">
<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">
<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Calendario</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>
<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"nuestrapp-3329a.firebaseapp.com",
projectId:"nuestrapp-3329a",
storageBucket:"nuestrapp-3329a.firebasestorage.app",
messagingSenderId:"11964303180",
appId:"1:11964303180:web:28412e809348d20d6af1e9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=null;
let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();
let notifiedEvents=[];

let data={
users:{},
planes:[],
restaurantes:[],
sitios:[]
};

function toggleMenu(){
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
if(user && data.users[user.name]){
menuUser.innerText=user.name;
menuPhoto.src=data.users[user.name].photo||"";
}
}

function closeMenu(){dropdown.style.display="none";}
function logout(){localStorage.removeItem("user");location.reload();}

function compressImage(file,size=320,quality=.85){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const canvas=document.createElement("canvas");
let w=img.width,h=img.height;
if(w>h && w>size){h*=size/w;w=size;}
if(h>=w && h>size){w*=size/h;h=size;}
canvas.width=w;
canvas.height=h;
canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",quality));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
});
}

function loadData(){
db.collection("app").doc("data").onSnapshot(doc=>{
if(doc.exists){
data=doc.data();
if(!data.planes)data.planes=[];

/* NUEVO: avisos al resto */
checkNewNotifications();

/* si está abierto calendario refresca */
if(content.innerHTML.includes("calendar-grid")){
renderCalendario();
}
}
});
}

async function saveData(){
await db.collection("app").doc("data").set(data);
}

async function register(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();
const file=photoInput.files[0];
if(!name||!pass)return;

let photo="";
if(file)photo=await compressImage(file);

data.users[name]={name,password:pass,photo,objetivos:[]};
await saveData();

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

async function login(){
const name=nameInput.value.trim();
const pass=passInput.value.trim();

const doc=await db.collection("app").doc("data").get();
if(doc.exists)data=doc.data();

if(!data.users[name]) return alert("No existe");
if(data.users[name].password!==pass) return alert("Contraseña incorrecta");

user={name};
localStorage.setItem("user",JSON.stringify(user));
startApp();
}

function startApp(){
auth.style.display="none";
app.style.display="block";
loadData();

if("Notification" in window){
Notification.requestPermission();
}
}

function goBack(){
content.innerHTML="";
mainMenu.style.display="grid";
}

function showSection(section){
closeMenu();
mainMenu.style.display="none";

if(section==="planes"){
renderCalendario();
return;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">
<h3>${section}</h3>
</div>`;
}

/* ================= CALENDARIO ================= */

function nombreMes(m){
return ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m];
}

function fechaKey(y,m,d){
return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function renderCalendario(){

const firstDay=new Date(currentYear,currentMonth,1).getDay();
const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
let start=(firstDay===0?6:firstDay-1);

let grid="";

for(let i=0;i<start;i++){
grid+=`<div class="day-box empty-day"></div>`;
}

for(let d=1;d<=daysInMonth;d++){

const key=fechaKey(currentYear,currentMonth,d);
const eventos=data.planes.filter(x=>x.fecha===key);

grid+=`
<div class="day-box" onclick="openDay('${key}')">
<div class="day-num">${d}</div>

<div class="day-events">
${eventos.slice(0,3).map(e=>`
<div class="mini-event" style="background:${e.color}"></div>
`).join("")}
</div>
</div>`;
}

content.innerHTML=`
<button class="back" onclick="goBack()">⬅</button>

<div class="card">

<div class="calendar-head">
<button class="cal-arrow" onclick="prevMonth()">‹</button>
<div class="cal-title">${nombreMes(currentMonth)} ${currentYear}</div>
<button class="cal-arrow" onclick="nextMonth()">›</button>
</div>

<div class="weekdays">
<div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div class="calendar-grid">
${grid}
</div>

<div class="widget-box">
<b>📲 Widget móvil</b><br><br>
En Android puedes añadir esta web a inicio y usarla como acceso rápido.<br>
En iPhone: Compartir → Añadir a pantalla de inicio.
</div>

</div>`;
}

function prevMonth(){
currentMonth--;
if(currentMonth<0){
currentMonth=11;
currentYear--;
}
renderCalendario();
}

function nextMonth(){
currentMonth++;
if(currentMonth>11){
currentMonth=0;
currentYear++;
}
renderCalendario();
}

function openDay(fecha){

const eventos=data.planes.filter(x=>x.fecha===fecha);

content.insertAdjacentHTML("beforeend",`
<div class="modal" id="modalDay">
<div class="modal-box">

<h3>${fecha}</h3>

<input id="evTitulo" placeholder="Evento">
<input id="evHora" type="time">
<input id="evLugar" placeholder="Lugar">
<input id="evColor" type="color" value="#ffe066">
<textarea id="evDesc" placeholder="Notas"></textarea>

<button onclick="saveEvent('${fecha}')">Guardar evento</button>

<div style="margin-top:15px">
${eventos.map((e,i)=>`
<div class="event-card">
<div style="display:flex;align-items:center;gap:8px;">
<img class="small-photo" src="${data.users[e.user]?.photo||''}">
<b>${e.titulo}</b>
</div>
🕒 ${e.hora||'-'}<br>
📍 ${e.lugar||'-'}<br>
👤 ${e.user}<br>
📝 ${e.desc||'-'}
</div>
`).join("") || "<p>Sin eventos</p>"}
</div>

<button onclick="closeModal()">Cerrar</button>

</div>
</div>`);
}

async function saveEvent(fecha){

const titulo=evTitulo.value.trim();
if(!titulo)return;

data.planes.push({
fecha,
titulo,
hora:evHora.value,
lugar:evLugar.value.trim(),
color:evColor.value,
desc:evDesc.value.trim(),
user:user.name,
createdAt:Date.now()
});

await saveData();

closeModal();
renderCalendario();
}

/* NUEVO: notificaciones resto usuarios */
function checkNewNotifications(){

if(!("Notification" in window)) return;
if(Notification.permission!=="granted") return;
if(!user) return;

data.planes.forEach(ev=>{

if(ev.user===user.name) return;

const id=ev.createdAt+"_"+ev.user+"_"+ev.titulo;

if(!notifiedEvents.includes(id)){
notifiedEvents.push(id);

new Notification("📅 Nuevo evento",{
body:ev.user+" creó: "+ev.titulo
});
}

});
}

function closeModal(){
document.getElementById("modalDay")?.remove();
}

document.addEventListener("DOMContentLoaded",()=>{
loadData();

const saved=localStorage.getItem("user");
if(saved){
user=JSON.parse(saved);
startApp();
}
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fdf6e3;
  text-align:center;
}
header{
  background:#ffe066;
  padding:15px;
  font-weight:bold;
  position:relative;
}
.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}
.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:10px;
  background:white;
  border-radius:16px;
  padding:18px;
  width:220px;
  box-shadow:0 6px 16px rgba(0,0,0,.15);
  z-index:99;
}
.profile-box{
  text-align:center;
  margin-bottom:15px;
}
.profile-photo{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ffe066;
}
.change-photo-btn{
  margin-top:10px;
  font-size:13px;
  width:100%;
}
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}
.menu button{
  background:#fff3bf;
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:16px;
}
.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
  position:relative;
}
input{
  margin:8px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  width:80%;
  box-sizing:border-box;
}
button{
  background:#ffe066;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
}
li{
  background:#fff9db;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  list-style:none;
  text-align:left;
}
.back{
  position:absolute;
  left:10px;
  top:10px;
}
.user-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.progress{
  width:72px;
  height:72px;
  border-radius:50%;
  background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
}
.progress img{
  width:56px;
  height:56px;
  border-radius:50%;
  object-fit:cover;
}
.done{
  text-decoration:line-through;
  opacity:.6;
}
.small-photo{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
  margin-right:8px;
}
.post-img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:14px;
  flex-shrink:0;
}
.auth-title{
  font-size:22px;
  margin-top:25px;
  font-weight:bold;
}
.obj-actions{
  float:right;
}
.obj-actions button{
  margin-left:6px;
}

/* GRID OBJETIVOS */
.users-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:15px;
}
.user-card{
  background:#fffdf4;
  border-radius:16px;
  padding:12px;
  text-align:left;
}
.user-card ul{
  padding:0;
  margin:0;
}

/* NUEVO RESTO MENUS */
.add-bar{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:20px;
  margin-bottom:15px;
}
.add-bar input[type="text"]{
  flex:1;
  width:auto;
  margin:0;
}
.camera-btn{
  background:#fff3bf;
  border:none;
  width:46px;
  height:46px;
  border-radius:12px;
  font-size:22px;
  cursor:pointer;
}
.hidden-file{
  display:none;
}

.post-row{
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.post-content{
  flex:1;
}
.post-user{
  display:flex;
  align-items:center;
  margin-bottom:6px;
  font-weight:bold;
}

@media(max-width:700px){
  .users-grid{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown">

<div class="profile-box">
<img id="menuPhoto" class="profile-photo" src="">
<div id="menuUser" style="margin-top:8px;font-weight:bold;"></div>

<input type="file" id="changePhotoInput" accept="image/*" style="display:none">
<button class="change-photo-btn" onclick="changePhotoInput.click()">
📷 Cambiar foto
</button>
</div>

<button style="width:100%;" onclick="logout()">Cerrar sesión 🚪</button>

</div>
</header>

<div id="auth">
<div class="auth-title">Iniciar sesión</div>

<input id="nameInput" placeholder="Usuario"><br>
<input id="passInput" type="password" placeholder="Contraseña"><br>
<input id="photoInput" type="file" accept="image/*"><br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="app" style="display:none">

<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Planes</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = null;

let data = {
  users:{},
  planes:[],
  restaurantes:[],
  sitios:[]
};

function toggleMenu(){
  dropdown.style.display =
  dropdown.style.display==="block" ? "none" : "block";

  if(dropdown.style.display==="block"){
    updateMenuProfile();
  }
}

function closeMenu(){
  dropdown.style.display="none";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function updateMenuProfile(){
  if(!user || !data.users[user.name]) return;
  menuUser.innerText = user.name;
  menuPhoto.src = data.users[user.name].photo || "";
}

function compressImage(file,size=320,quality=0.85){
  return new Promise(resolve=>{
    const reader = new FileReader();

    reader.onload = e=>{
      const img = new Image();

      img.onload = ()=>{
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if(w>h){
          if(w>size){
            h *= size/w;
            w = size;
          }
        }else{
          if(h>size){
            w *= size/h;
            h = size;
          }
        }

        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);

        resolve(canvas.toDataURL("image/jpeg",quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function loadData(){
  db.collection("app").doc("data")
  .onSnapshot(doc=>{
    if(doc.exists){
      data = doc.data();
      updateMenuProfile();
    }
  });
}

async function saveData(){
  await db.collection("app").doc("data").set(data);
}

async function register(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();
  const file = photoInput.files[0];

  if(!name || !pass) return alert("Completa usuario y contraseña");

  if(data.users[name]) return alert("Ese usuario ya existe");

  let photo = null;
  if(file) photo = await compressImage(file);

  data.users[name] = {
    name:name,
    password:pass,
    photo:photo,
    objetivos:[]
  };

  await saveData();

  user = {name:name};
  localStorage.setItem("user",JSON.stringify(user));
  startApp();
}

async function login(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();

  if(!name || !pass) return alert("Pon usuario y contraseña");

  const doc = await db.collection("app").doc("data").get();
  if(doc.exists) data = doc.data();

  const found = data.users[name];

  if(!found) return alert("Usuario no existe");
  if(found.password !== pass) return alert("Contraseña incorrecta");

  user = {name:name};
  localStorage.setItem("user",JSON.stringify(user));

  startApp();
}

function startApp(){
  loadData();
  auth.style.display="none";
  app.style.display="block";
  updateMenuProfile();
}

changePhotoInput.addEventListener("change", async function(){

  const file = this.files[0];
  if(!file || !user) return;

  const img = await compressImage(file,320,0.85);

  data.users[user.name].photo = img;

  await saveData();
  updateMenuProfile();

  const actual = document.querySelector("[data-section]");
  if(actual) showSection(actual.dataset.section);
});

function showSection(section){

closeMenu();
mainMenu.style.display="none";

if(section==="objetivos"){

content.innerHTML = `
<button class="back" onclick="goBack()">⬅</button>
<div class="card" data-section="objetivos">

<div class="users-grid">

${Object.values(data.users).map(u=>{

const total = u.objetivos.length;
const done = u.objetivos.filter(x=>x.done).length;
const percent = total ? (done/total)*100 : 0;

return `
<div class="user-card">

<div class="user-header">
<div class="progress" style="--progress:${percent}%">
<img src="${u.photo || ''}">
</div>

<div>
<b>${u.name}</b><br>
<small>${Math.round(percent)}% completado</small>
</div>
</div>

<ul>
${u.objetivos.map((o,i)=>`
<li class="${o.done?'done':''}">
${o.text}

<span class="obj-actions">
<button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
<button onclick="removeObjetivo('${u.name}',${i})">❌</button>
</span>

</li>
`).join("")}
</ul>

</div>
`;

}).join("")}

</div>

<input id="newItem" placeholder="Nuevo objetivo">
<button onclick="addItem('objetivos')">Añadir</button>

</div>
`;
return;
}

/* RESTAURANTES / SITIOS / PLANES */
content.innerHTML = `
<button class="back" onclick="goBack()">⬅</button>

<div class="card" data-section="${section}">

<div class="add-bar">
<input id="newItem" type="text" placeholder="Escribe algo">
<label class="camera-btn" for="imgInput">📷</label>
<input class="hidden-file" type="file" id="imgInput" accept="image/*">
<button onclick="addItem('${section}')">Añadir</button>
</div>

<ul>

${data[section].map((item,i)=>`
<li>

<div class="post-row">

${item.img ? `<img class="post-img" src="${item.img}">` : ``}

<div class="post-content">

<div class="post-user">
<img class="small-photo"
src="${data.users[item.user]?.photo || ''}">
${item.user}
</div>

<div>${item.text}</div>

<br>
<button onclick="removeItem('${section}',${i})">❌</button>

</div>

</div>

</li>
`).join("")}

</ul>

</div>
`;
}

async function addItem(section){

const text = newItem.value.trim();
const file = document.getElementById("imgInput")?.files[0];

if(!text) return;

if(section==="objetivos"){

data.users[user.name].objetivos.push({
  text:text,
  done:false
});

await saveData();
showSection(section);
return;
}

let img = null;

if(file){
  img = await compressImage(file,600,0.88);
}

data[section].push({
  text:text,
  user:user.name,
  img:img
});

await saveData();
showSection(section);
}

function toggleObjetivo(name,i){
data.users[name].objetivos[i].done =
!data.users[name].objetivos[i].done;

saveData();
showSection("objetivos");
}

function removeObjetivo(name,i){
data.users[name].objetivos.splice(i,1);
saveData();
showSection("objetivos");
}

function removeItem(section,i){
data[section].splice(i,1);
saveData();
showSection(section);
}

function goBack(){
closeMenu();
content.innerHTML="";
mainMenu.style.display="grid";
}

document.addEventListener("DOMContentLoaded",()=>{

loadData();

const saved = localStorage.getItem("user");

if(saved){
  user = JSON.parse(saved);

  setTimeout(()=>{
    startApp();
  },500);
}

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#fdf6e3;
  text-align:center;
}
header{
  background:#ffe066;
  padding:15px;
  font-weight:bold;
  position:relative;
}

.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* MENU DESPLEGABLE NUEVO */
.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:10px;
  width:240px;
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
  z-index:999;
}

.profile-box{
  text-align:center;
  margin-bottom:15px;
}

.profile-photo{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ffe066;
}

.change-btn{
  margin-top:10px;
  font-size:13px;
  width:100%;
}

.logout-btn{
  width:100%;
  margin-top:10px;
}

/* RESTO */
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.menu button{
  background:#fff3bf;
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:16px;
}

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:20px;
}

input{
  margin:8px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  width:80%;
  box-sizing:border-box;
}

button{
  background:#ffe066;
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
}

li{
  background:#fff9db;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
  list-style:none;
  text-align:left;
}

.back{
  position:absolute;
  left:10px;
  top:10px;
}

.user-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.progress{
  width:72px;
  height:72px;
  border-radius:50%;
  background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
  display:flex;
  align-items:center;
  justify-content:center;
}

.progress img{
  width:56px;
  height:56px;
  border-radius:50%;
  object-fit:cover;
}

.done{
  text-decoration:line-through;
  opacity:.6;
}

.small-photo{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
  vertical-align:middle;
  margin-right:8px;
}

.post-img{
  width:120px;
  border-radius:12px;
  margin-top:8px;
}

.auth-title{
  font-size:22px;
  margin-top:25px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛

<div id="dropdown" class="dropdown"></div>
</header>

<!-- LOGIN -->
<div id="auth">
<div class="auth-title">Iniciar sesión</div>

<input id="nameInput" placeholder="Usuario"><br>
<input id="passInput" type="password" placeholder="Contraseña"><br>
<input id="photoInput" type="file" accept="image/*"><br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>
<button onclick="showSection('planes')">📅 Planes</button>
<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = null;

let data = {
  users:{},
  planes:[],
  restaurantes:[],
  sitios:[]
};

/* MENU */
function toggleMenu(){
  if(!user) return;

  const d = dropdown;

  if(d.style.display==="block"){
    d.style.display="none";
    return;
  }

  renderDropdown();
  d.style.display="block";
}

function closeMenu(){
  dropdown.style.display="none";
}

function renderDropdown(){
  const u = data.users[user.name];
  if(!u) return;

  dropdown.innerHTML = `
    <div class="profile-box">
      <img class="profile-photo" src="${u.photo || ''}">
      <div style="margin-top:8px;"><b>${u.name}</b></div>

      <input type="file" id="changePhotoInput" accept="image/*" style="display:none">
      <button class="change-btn" onclick="document.getElementById('changePhotoInput').click()">
        Cambiar foto 📷
      </button>

      <button class="logout-btn" onclick="logout()">Cerrar sesión 🚪</button>
    </div>
  `;

  setTimeout(()=>{
    const input = document.getElementById("changePhotoInput");
    if(input){
      input.onchange = changePhoto;
    }
  },100);
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* IMAGEN */
function compressImage(file,size=320,quality=0.85){
  return new Promise(resolve=>{
    const reader = new FileReader();

    reader.onload = e=>{
      const img = new Image();

      img.onload = ()=>{
        const canvas = document.createElement("canvas");

        let w = img.width;
        let h = img.height;

        if(w>h){
          if(w>size){
            h *= size/w;
            w = size;
          }
        }else{
          if(h>size){
            w *= size/h;
            h = size;
          }
        }

        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);

        resolve(canvas.toDataURL("image/jpeg",quality));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}

/* CAMBIAR FOTO */
async function changePhoto(e){
  const file = e.target.files[0];
  if(!file) return;

  const newPhoto = await compressImage(file,320,0.85);

  data.users[user.name].photo = newPhoto;
  await saveData();

  renderDropdown();
  if(content.innerHTML) showSection(lastSection || "objetivos");
}

/* FIREBASE */
function loadData(){
  db.collection("app").doc("data")
  .onSnapshot(doc=>{
    if(doc.exists) data = doc.data();
  });
}

async function saveData(){
  await db.collection("app").doc("data").set(data);
}

/* REGISTRO */
async function register(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();
  const file = photoInput.files[0];

  if(!name || !pass) return alert("Completa usuario y contraseña");

  if(data.users[name]) return alert("Ese usuario ya existe");

  let photo = null;

  if(file) photo = await compressImage(file);

  data.users[name] = {
    name,
    password:pass,
    photo,
    objetivos:[]
  };

  await saveData();

  user = {name};
  localStorage.setItem("user",JSON.stringify(user));

  startApp();
}

/* LOGIN */
async function login(){

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();

  const doc = await db.collection("app").doc("data").get();

  if(doc.exists) data = doc.data();

  const found = data.users[name];

  if(!found) return alert("Usuario no existe");
  if(found.password !== pass) return alert("Contraseña incorrecta");

  user = {name};
  localStorage.setItem("user",JSON.stringify(user));

  startApp();
}

/* APP */
function startApp(){
  loadData();
  auth.style.display="none";
  app.style.display="block";
}

let lastSection = "";

/* SECCIONES */
function showSection(section){

  closeMenu(); /* 🔥 se cierra al entrar */

  lastSection = section;
  mainMenu.style.display="none";

  content.innerHTML = `<div class="card"><b>${section}</b></div>`;
}

function goBack(){
  closeMenu();
  content.innerHTML="";
  mainMenu.style.display="grid";
}

/* AUTO LOGIN */
document.addEventListener("DOMContentLoaded",()=>{

  loadData();

  const saved = localStorage.getItem("user");

  if(saved){
    user = JSON.parse(saved);

    setTimeout(()=>{
      startApp();
    },500);
  }

});
</script>

</body>
</html>

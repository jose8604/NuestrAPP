<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nuestra App</title>

<link rel="icon" type="image/png" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffe066">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nuestra App">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fdf6e3;
text-align:center;
overflow-x:hidden;
}
header{
background:#ffe066;
padding:15px;
font-weight:bold;
position:relative;
font-size:18px;
}
.menu-btn{
position:absolute;
left:10px;
top:10px;
font-size:22px;
cursor:pointer;
}
.dropdown{
display:none;
position:absolute;
top:55px;
left:10px;
background:white;
border-radius:16px;
padding:18px;
width:220px;
max-width:90vw;
box-shadow:0 6px 16px rgba(0,0,0,.15);
z-index:99;
}
.profile-box{text-align:center;margin-bottom:15px;}
.profile-photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffe066;
}
.change-photo-btn{
margin-top:10px;
font-size:13px;
width:100%;
}
.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}
.menu button{
background:#fff3bf;
border:none;
border-radius:20px;
padding:22px;
font-size:16px;
width:100%;
}
.card{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
position:relative;
max-width:100%;
overflow:hidden;
}
input,textarea,select{
margin:8px 0;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
width:100%;
font-size:15px;
}
button{
background:#ffe066;
border:none;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
}
li{
background:#fff9db;
margin:10px 0;
padding:12px;
border-radius:12px;
list-style:none;
text-align:left;
}
.back{
position:absolute;
left:10px;
top:10px;
}
.user-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.progress{
width:72px;
height:72px;
border-radius:50%;
background:conic-gradient(#51cf66 var(--progress), #ececec 0%);
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}
.progress img{
width:56px;
height:56px;
border-radius:50%;
object-fit:cover;
}
.done{
text-decoration:line-through;
opacity:.6;
}
.small-photo{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
margin-right:8px;
}
.post-img{
width:100%;
max-width:220px;
border-radius:12px;
margin-top:10px;
display:block;
}
.obj-actions{float:right;}
.users-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:15px;
}
.user-card{
background:#fffdf4;
border-radius:16px;
padding:12px;
text-align:left;
min-width:0;
}
.user-card ul{padding:0;margin:0;}
.rest-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}
.rest-col{
background:#fffdf4;
padding:12px;
border-radius:16px;
text-align:left;
}
.rest-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.plus-btn{
width:42px;
height:42px;
border-radius:50%;
font-size:24px;
padding:0;
}
.rest-item{
background:#fff9db;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}
.rest-line{
display:flex;
align-items:center;
gap:8px;
}
.rest-actions{
margin-left:auto;
display:flex;
gap:6px;
}
.star{
font-size:24px;
cursor:pointer;
opacity:.4;
}
.star.active{opacity:1;}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
.modal-box{
background:white;
width:92%;
max-width:420px;
border-radius:18px;
padding:18px;
max-height:90vh;
overflow:auto;
}
.icon-btn{
width:38px;
height:38px;
border-radius:50%;
padding:0;
font-size:18px;
}

/* ===== NUEVO CALENDARIO ===== */
.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}
.calendar-day{
background:#fff9db;
padding:10px;
border-radius:10px;
min-height:50px;
cursor:pointer;
position:relative;
}
.event-dot{
width:8px;
height:8px;
border-radius:50%;
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
}
.event-card{
background:#fff9db;
margin:8px 0;
padding:10px;
border-radius:12px;
text-align:left;
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
💛 Nuestra App 💛
</header>

<div id="app" style="display:none">

<div id="mainMenu" class="menu">
<button onclick="showSection('objetivos')">🎯 Objetivos</button>

<!-- SOLO CAMBIO -->
<button onclick="showSection('planes')">📅 Calendario</button>

<button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
<button onclick="showSection('sitios')">📍 Sitios</button>
</div>

<div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={/* TU MISMO FIREBASE */};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user=null;
let data={users:{},planes:[],restaurantes:[],sitios:[]};

/* ===== NUEVO CALENDARIO ===== */
let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();

function renderCalendario(){
let days=new Date(currentYear,currentMonth+1,0).getDate();

let html=`
<button class="back" onclick="goBack()">⬅</button>
<div class="card">

<div class="calendar-header">
<button onclick="changeMonth(-1)">⬅</button>
<h3>${currentMonth+1}/${currentYear}</h3>
<button onclick="changeMonth(1)">➡</button>
</div>

<div class="calendar-grid">`;

for(let i=1;i<=days;i++){
let key=getKey(i);
let events=data.planes.filter(e=>e.date===key);

html+=`
<div class="calendar-day" onclick="openDay(${i})">
${i}
${events[0]?`<div class="event-dot" style="background:${events[0].color}"></div>`:''}
</div>`;
}

html+=`</div></div>`;
content.innerHTML=html;
}

function changeMonth(n){
currentMonth+=n;
if(currentMonth<0){currentMonth=11;currentYear--;}
if(currentMonth>11){currentMonth=0;currentYear++;}
renderCalendario();
}

function getKey(d){
return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function openDay(day){
let key=getKey(day);
let events=data.planes.filter(e=>e.date===key);

content.innerHTML=`
<button class="back" onclick="renderCalendario()">⬅</button>
<div class="card">

<h3>${key}</h3>

<input id="title">
<input id="hour" type="time">
<input id="place">
<input id="color" type="color">
<textarea id="desc"></textarea>

<button onclick="saveEvent('${key}')">Guardar</button>

${events.map(e=>`
<div class="event-card" style="border-left:5px solid ${e.color}">
<img class="small-photo" src="${data.users[e.user]?.photo||''}">
<b>${e.title}</b><br>
${e.hour} - ${e.place}<br>
${e.desc}
</div>
`).join("")}

</div>`;
}

function saveEvent(date){
data.planes.push({
date,
title:title.value,
hour:hour.value,
place:place.value,
color:color.value,
desc:desc.value,
user:user.name
});
saveData();
renderCalendario();
}

/* ===== SOLO ENGANCHE ===== */

function showSection(section){

if(section==="planes"){
renderCalendario();
return;
}

/* TU APP ORIGINAL NO SE TOCA */
content.innerHTML="... tu código original sigue igual ...";
}

function saveData(){
db.collection("app").doc("data").set(data);
}

function goBack(){
content.innerHTML="";
document.getElementById("mainMenu").style.display="grid";
}

</script>

</body>
</html>

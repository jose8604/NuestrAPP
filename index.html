<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #fdf6e3;
  text-align: center;
}

header {
  background: #ffe066;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  position: relative;
}

/* MENU DESPLEGABLE */
.menu-btn {
  position: absolute;
  left: 10px;
  top: 10px;
  font-size: 22px;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  top: 50px;
  left: 10px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  padding: 10px;
}

.dropdown button {
  display: block;
  width: 100%;
  margin: 5px 0;
}

.container {
  padding: 20px;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 20px;
}

.menu button {
  background: #fff3bf;
  border: none;
  border-radius: 20px;
  padding: 20px;
  font-size: 16px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

input {
  padding: 10px;
  width: 80%;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  padding: 10px;
  border-radius: 10px;
  background: #ffe066;
}

.back {
  position: absolute;
  left: 10px;
  top: 10px;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  💛 Nuestra App 💛

  <div id="dropdown" class="dropdown">
    <button onclick="logout()">Cerrar sesión 🚪</button>
  </div>
</header>

<div id="auth" class="container">
  <h3>Registro</h3>
  <input id="name" placeholder="Tu nombre"><br>
  <input type="file" id="photo"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;" class="container">

  <div id="mainMenu" class="menu">
    <button onclick="showSection('objetivos')">🎯 Objetivos</button>
    <button onclick="showSection('planes')">📅 Planes</button>
    <button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
    <button onclick="showSection('sitios')">📍 Sitios</button>
  </div>

  <div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVlV-t9OvQuZEOoV4zAVOSBcHNwSaHbqI",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
let user = null;

let data = {
  users: {},
  planes: [],
  restaurantes: [],
  sitios: []
};

/* MENU */
function toggleMenu() {
  const menu = document.getElementById("dropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

/* FIREBASE */
function loadData() {
  db.collection("app").doc("data")
    .onSnapshot((doc) => {
      if (doc.exists) {
        data = doc.data();
        console.log("DATOS RECIBIDOS", data);
      }
    });
}

function saveData() {
  console.log("GUARDANDO...");
  db.collection("app").doc("data").set(data);
}

/* LOGIN */
function login() {
  console.log("LOGIN CLICK");

  const name = document.getElementById('name').value;
  const photoInput = document.getElementById('photo');

  if (!name) return alert("Pon un nombre");

  const reader = new FileReader();

  reader.onload = async function(e) {
    console.log("GUARDANDO EN FIREBASE");

    user = { name, photo: e.target.result };
    localStorage.setItem("user", JSON.stringify(user));

    await db.collection("app").doc("data").set({
      users: {
        [user.name]: {
          name: user.name,
          photo: user.photo,
          objetivos: []
        }
      }
    }, { merge: true });

    startApp();
  };

  if (photoInput.files[0]) {
    reader.readAsDataURL(photoInput.files[0]);
  } else {
    console.log("SIN FOTO, GUARDANDO");

    user = { name, photo: null };
    localStorage.setItem("user", JSON.stringify(user));

    db.collection("app").doc("data").set({
      users: {
        [user.name]: {
          name: user.name,
          photo: null,
          objetivos: []
        }
      }
    }, { merge: true });

    startApp();
  }
}

/* APP */
function startApp() {
  loadData();
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* SECCIONES */
function showSection(section) {
  document.getElementById('mainMenu').style.display = 'none';

  const container = document.getElementById('content');

  container.innerHTML = `
    <button class="back" onclick="goBack()">⬅</button>
    <div class="card">
      <h2>${section}</h2>
      <input id="newItem" placeholder="Añadir...">
      <button onclick="addItem('${section}')">Añadir</button>
      <ul>
        ${(data[section] || []).map((item, i) => `
          <li>
            <img src="${data.users[item.user]?.photo}" width="30" style="border-radius:50%;">
            ${item.text}
          </li>
        `).join('')}
      </ul>
    </div>
  `;
}

function goBack() {
  document.getElementById('content').innerHTML = '';
  document.getElementById('mainMenu').style.display = 'grid';
}

/* ITEMS */
function addItem(section) {
  const text = document.getElementById('newItem').value;
  if (!text) return;

  data[section].push({
    text,
    user: user.name
  });

  saveData();
  showSection(section);
}

/* AUTO LOGIN */
window.onload = function() {
  const savedUser = localStorage.getItem("user");

  if (savedUser) {
    user = JSON.parse(savedUser);
    startApp();
  }
};
</script>

</body>
</html>

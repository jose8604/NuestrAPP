<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #fdf6e3;
  text-align: center;
}

header {
  background: #ffe066;
  padding: 15px;
  font-weight: bold;
}

.menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.menu button {
  background: #fff3bf;
  border-radius: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

input {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

button {
  background: #ffe066;
  padding: 10px;
  border-radius: 10px;
}

li {
  background: #fff9db;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

/* 🟢 progreso */
.progress {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: conic-gradient(#51cf66 var(--progress), #eee 0%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.progress img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
}

.user-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ✔️ completado */
.done {
  text-decoration: line-through;
  opacity: 0.6;
}

.back {
  position: absolute;
  left: 10px;
  top: 10px;
}
</style>
</head>

<body>

<header>💛 Nuestra App 💛</header>

<div id="auth">
  <input id="name" placeholder="Tu nombre"><br>
  <input type="file" id="photo"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

  <div id="mainMenu" class="menu">
    <button onclick="showSection('objetivos')">🎯 Objetivos</button>
    <button onclick="showSection('planes')">📅 Planes</button>
    <button onclick="showSection('restaurantes')">🍽️ Restaurantes</button>
    <button onclick="showSection('sitios')">📍 Sitios</button>
  </div>

  <div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nuestrapp-3329a.firebaseapp.com",
  projectId: "nuestrapp-3329a",
  storageBucket: "nuestrapp-3329a.firebasestorage.app",
  messagingSenderId: "11964303180",
  appId: "1:11964303180:web:28412e809348d20d6af1e9",
  measurementId: "G-J486WD0TVW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
let user = null;

let data = {
  users: {},
  planes: [],
  restaurantes: [],
  sitios: []
};

function loadData(){
  db.collection("app").doc("data")
  .onSnapshot(doc=>{
    if(doc.exists) data = doc.data();
  });
}

async function saveData(){
  await db.collection("app").doc("data").set(data);
}

async function login(){
  const name = nameInput.value;
  const file = photo.files[0];

  if(!name) return alert("Pon nombre");

  let photoData = null;

  if(file){
    photoData = await new Promise(r=>{
      const reader = new FileReader();
      reader.onload = e => r(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  user = {name, photo:photoData};
  localStorage.setItem("user", JSON.stringify(user));

  await db.collection("app").doc("data").set({
    users:{
      [name]:{name,photo:photoData,objetivos:[]}
    }
  },{merge:true});

  startApp();
}

function startApp(){
  loadData();
  auth.style.display="none";
  app.style.display="block";
}

function showSection(section){
  mainMenu.style.display="none";

  if(section==="objetivos"){
    content.innerHTML = `
    <button class="back" onclick="goBack()">⬅</button>
    <div class="card">

    ${Object.values(data.users).map(u=>{
      const total=u.objetivos.length;
      const done=u.objetivos.filter(o=>o.done).length;
      const percent=total?(done/total)*100:0;

      return `
      <div>

        <div class="user-header">
          <div class="progress" style="--progress:${percent}%">
            <img src="${u.photo||''}">
          </div>
          <b>${u.name}</b>
        </div>

        <ul>
        ${u.objetivos.map((o,i)=>`
          <li class="${o.done?'done':''}">
            ${o.text}
            <button onclick="toggleObjetivo('${u.name}',${i})">✔</button>
          </li>
        `).join('')}
        </ul>

      </div>
      `;
    }).join('')}

    <input id="newItem">
    <button onclick="addItem('objetivos')">Añadir</button>

    </div>`;
    return;
  }

  content.innerHTML = `
  <button class="back" onclick="goBack()">⬅</button>
  <div class="card">

  <input id="newItem">
  <input type="file" id="imgInput">
  <button onclick="addItem('${section}')">Añadir</button>

  <ul>
  ${data[section].map((item,i)=>`
    <li>
      <img src="${data.users[item.user]?.photo}" width="30" style="border-radius:50%">
      ${item.text}
      ${item.img?`<br><img src="${item.img}" width="100">`:''}
      <button onclick="removeItem('${section}',${i})">❌</button>
    </li>
  `).join('')}
  </ul>

  </div>`;
}

function addItem(section){
  const text = newItem.value;
  const file = document.getElementById("imgInput")?.files[0];

  if(!text) return;

  if(section==="objetivos"){
    data.users[user.name].objetivos.push({text,done:false});
    saveData();
    showSection(section);
    return;
  }

  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      data[section].push({text,user:user.name,img:e.target.result});
      saveData();
      showSection(section);
    };
    reader.readAsDataURL(file);
  }else{
    data[section].push({text,user:user.name});
    saveData();
    showSection(section);
  }
}

function toggleObjetivo(name,i){
  let obj=data.users[name].objetivos[i];
  obj.done=!obj.done;
  saveData();
  showSection("objetivos");
}

function removeItem(section,i){
  data[section].splice(i,1);
  saveData();
  showSection(section);
}

function goBack(){
  content.innerHTML="";
  mainMenu.style.display="grid";
}

document.addEventListener("DOMContentLoaded",()=>{
  const saved=localStorage.getItem("user");
  if(saved){
    user=JSON.parse(saved);
    startApp();
  }
});
</script>

</body>
</html>
